<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نموذج متابعة الحالة الصحية</title>
<style>
body {
  font-family: "Tajawal", Arial;
  background: #f5f7fa;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,.1);
}
h2 {
  color: #1e3a5f;
}
label {
  font-weight: bold;
}
input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0 15px;
}
.mood {
  display: flex;
  justify-content: space-around;
  font-size: 30px;
}
.mood span {
  cursor: pointer;
}
.good {color: green;}
.ok {color: orange;}
.bad {color: red;}
</style>
</head>

<body>

<div class="card">
<h2>🧓 متابعة حالة الوالدة</h2>

<label>التاريخ</label>
<input type="date">

<label>الفترة</label>
<select>
  <option>صباحًا</option>
  <option>ظهرًا</option>
  <option>مساءً</option>
</select>

<label>درجة الحرارة (°C)</label>
<input type="number" step="0.1">

<label>ضغط الدم</label>
<input type="text" placeholder="مثال: 130/80">

<label>السكر (mg/dl)</label>
<input type="number">

<label>كمية البول (ml)</label>
<input type="number">

<label>لون البول</label>
<select>
  <option>أصفر فاتح</option>
  <option>غامق</option>
</select>

<label>الرائحة</label>
<select>
  <option>خفيفة</option>
  <option>قوية</option>
</select>

<label>الحالة العامة</label>
<div class="mood">
  <span class="good">😊</span>
  <span class="ok">😐</span>
  <span class="bad">😞</span>
</div>

</div>

</body>
</html>
