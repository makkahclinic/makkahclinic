<script>
  const redirectUrl = "https://wa.me/966565668428";

  // العنوان البشري
  const humanAddress1 = "مكة المكرمة – حي الزاهر";
  const humanAddress2 = "خلف أسواق الضيافة – أمام المسجد الكويتي";
  const clinicName = "مجمع مكة الطبي";

  // Plus Code للنسخ والخرائط
  const plusCode = "CQVX+P83";

  // رابط خرائط جوجل الدقيق
  const mapsUrl =
    "https://www.google.com/maps/search/?api=1&query=" +
    encodeURIComponent(plusCode + " Mecca");

  // النص الكامل للنسخ
  const fullAddress = `${clinicName}
${humanAddress1}
${humanAddress2}
Plus Code: ${plusCode}
${mapsUrl}`;

  document.getElementById("addressLine1").textContent = humanAddress1;
  document.getElementById("addressLine2").textContent = humanAddress2;
  document.getElementById("plusCodeBox").textContent = `Plus Code: ${plusCode}`;
  document.getElementById("mapsLink").href = mapsUrl;

  // زر التواصل
  document.getElementById("contactBtn").addEventListener("click", () => {
    window.location.href = redirectUrl;
  });

  // زر نسخ العنوان
  document.getElementById("copyAddressBtn").addEventListener("click", () => {
    navigator.clipboard.writeText(fullAddress).then(() => {
      const btn = document.getElementById("copyAddressBtn");
      const original = btn.innerHTML;
      btn.innerHTML = "✓ تم نسخ العنوان";
      setTimeout(() => (btn.innerHTML = original), 2000);
    });
  });
</script>
