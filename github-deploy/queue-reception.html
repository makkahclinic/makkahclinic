<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام الطوابير | استقبال - مجمع مكة الطبي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1e3a5f;
      --primary-dark: #0d1f33;
      --gold: #c9a962;
      --gold-light: #f4d03f;
      --success: #10b981;
      --danger: #ef4444;
      --info: #3b82f6;
      --white: #ffffff;
      --gray: #94a3b8;
      --bg: #f0f4f8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    .topbar {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .topbar img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid var(--gold);
    }

    .topbar h1 { font-size: 1.3rem; font-weight: 800; }
    .topbar p { font-size: 0.8rem; color: var(--gold); }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .topbar-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }

    .topbar-btn:hover { background: rgba(255,255,255,0.2); }
    .topbar-btn.gold { background: var(--gold); color: var(--primary); border-color: var(--gold); }

    .main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1500px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 22px;
      font-weight: 800;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #f1f5f9;
    }

    .card-header i { color: var(--gold); }

    .card-body { padding: 20px; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #374151;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      transition: 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,169,98,0.15);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--primary);
    }

    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,169,98,0.4); }

    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-info { background: var(--info); color: white; }
    .btn-sm { padding: 8px 14px; font-size: 0.85rem; width: auto; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat-box {
      text-align: center;
      padding: 12px 8px;
      border-radius: 12px;
      background: #f8fafc;
    }

    .stat-box .num {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
    }

    .stat-box .lbl {
      font-size: 0.75rem;
      color: var(--gray);
      font-weight: 600;
    }

    .stat-box.waiting .num { color: var(--info); }
    .stat-box.called .num { color: var(--gold); }
    .stat-box.done .num { color: var(--success); }

    .doctor-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }

    .doc-chip {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid #e5e7eb;
      background: white;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .doc-chip:hover { border-color: var(--gold); }
    .doc-chip.active { background: var(--gold); color: var(--primary); border-color: var(--gold); }

    .queue-list { max-height: 600px; overflow-y: auto; }

    .q-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      transition: 0.2s;
    }

    .q-item:hover { background: #f8fafc; }

    .q-item-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .q-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.9rem;
      color: white;
      background: var(--info);
    }

    .q-num.called { background: var(--gold); color: var(--primary); animation: pulse 1.5s infinite; }
    .q-num.done { background: var(--success); }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .q-name { font-weight: 700; font-size: 0.95rem; }
    .q-doctor { font-size: 0.8rem; color: var(--gray); }
    .q-clinic { font-size: 0.75rem; color: var(--info); }

    .q-actions { display: flex; gap: 6px; }

    .q-actions button {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: white;
      transition: 0.2s;
    }

    .q-actions button:hover { transform: scale(1.1); }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--gray);
    }

    .empty-state i { font-size: 2.5rem; margin-bottom: 10px; display: block; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--primary);
      color: white;
      padding: 14px 28px;
      border-radius: 14px;
      font-weight: 700;
      z-index: 9999;
      transition: 0.3s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    .doctors-setup {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .doc-setup-item {
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .doc-setup-item:hover { border-color: var(--gold); }
    .doc-setup-item.active { border-color: var(--success); background: #f0fdf4; }

    .doc-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d1d5db;
    }

    .doc-setup-item.active .doc-status { background: var(--success); }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="icon" type="image/jpeg" href="https://www.m2020m.org/logo2026.jpg">
  <link rel="apple-touch-icon" href="https://www.m2020m.org/logo2026.jpg">
</head>
<body>

<div class="topbar">
  <div class="topbar-right">
    <img src="https://www.m2020m.org/logo2026.jpg" alt="شعار">
    <div>
      <h1>نظام إدارة الطوابير</h1>
      <p>مجمع مكة الطبي بالزاهر - الاستقبال</p>
    </div>
  </div>
  <div class="topbar-left">
    <a href="queue-display.html" target="_blank" class="topbar-btn gold">
      <i class="fas fa-tv"></i> فتح شاشة العرض
    </a>
    <button class="topbar-btn" onclick="clearDoneQueue()">
      <i class="fas fa-broom"></i> مسح المنتهين
    </button>
  </div>
</div>

<div class="main-grid">
  <div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><i class="fas fa-user-plus"></i> إضافة مريض للطابور</div>
      <div class="card-body">
        <div class="form-group">
          <label><i class="fas fa-user"></i> اسم المريض</label>
          <input type="text" id="patientName" placeholder="أدخل اسم المريض" autocomplete="off">
        </div>
        <div class="form-group">
          <label><i class="fas fa-stethoscope"></i> الطبيب</label>
          <select id="doctorSelect">
            <option value="">-- اختر الطبيب --</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-file-medical"></i> رقم الملف (اختياري)</label>
          <input type="text" id="fileNumber" placeholder="رقم ملف المريض">
        </div>
        <button class="btn btn-gold" onclick="addToQueue()">
          <i class="fas fa-plus-circle"></i> إضافة للطابور
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><i class="fas fa-cog"></i> الأطباء والعيادات</div>
      <div class="card-body">
        <div id="doctorsSetup" class="doctors-setup"></div>
        <div style="margin-top:15px;padding-top:15px;border-top:2px solid #f1f5f9">
          <div class="form-group" style="margin-bottom:8px">
            <input type="text" id="newDoctorName" placeholder="اسم الطبيب الجديد">
          </div>
          <div class="form-group" style="margin-bottom:8px">
            <input type="text" id="newClinicName" placeholder="اسم العيادة / رقم الغرفة">
          </div>
          <button class="btn btn-info btn-sm" onclick="addDoctor()" style="width:100%">
            <i class="fas fa-plus"></i> إضافة طبيب
          </button>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="card">
      <div class="card-header">
        <i class="fas fa-list-ol"></i> طابور المرضى
        <span id="queueCount" style="margin-right:auto;background:var(--info);color:white;padding:3px 12px;border-radius:20px;font-size:0.8rem;"></span>
      </div>
      <div class="card-body" style="padding:10px">
        <div class="stats-row" id="statsRow">
          <div class="stat-box waiting"><div class="num" id="statWaiting">0</div><div class="lbl">بالانتظار</div></div>
          <div class="stat-box called"><div class="num" id="statCalled">0</div><div class="lbl">تم نداؤه</div></div>
          <div class="stat-box done"><div class="num" id="statDone">0</div><div class="lbl">منتهي</div></div>
        </div>
        <div class="doctor-filter" id="doctorFilter"></div>
        <div class="queue-list" id="queueList">
          <div class="empty-state">
            <i class="fas fa-users"></i>
            <p>لا يوجد مرضى في الطابور</p>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:15px">
      <div class="card-header" style="background:linear-gradient(135deg,#059669,#047857)">
        <i class="fas fa-archive"></i> أرشفة وتقارير
      </div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px">
          <div class="stat-box" style="background:#f0fdf4;text-align:center;padding:12px;border-radius:10px">
            <div class="num" id="archiveCount" style="color:#059669;font-size:1.3rem">-</div>
            <div class="lbl" style="color:#065f46;font-size:0.75rem">مؤرشف اليوم</div>
          </div>
          <div class="stat-box" style="background:#fffbeb;text-align:center;padding:12px;border-radius:10px">
            <div class="num" id="archiveAvgWait" style="color:#d97706;font-size:1.3rem">-</div>
            <div class="lbl" style="color:#92400e;font-size:0.75rem">متوسط الانتظار (د)</div>
          </div>
        </div>
        <button class="btn" onclick="archiveToSheet()" style="width:100%;background:#059669;color:white;margin-bottom:8px">
          <i class="fas fa-cloud-upload-alt"></i> أرشفة الطابور الحالي
        </button>
        <button class="btn" onclick="syncDoctorsToSheet()" style="width:100%;background:var(--info);color:white;margin-bottom:8px">
          <i class="fas fa-user-md-gear"></i> حفظ الأطباء في الشيت
        </button>
        <button class="btn" onclick="calcDailyStats()" style="width:100%;background:var(--gold);color:var(--primary)">
          <i class="fas fa-chart-bar"></i> حساب إحصائيات اليوم
        </button>
        <div id="archiveStatus" style="margin-top:10px;font-size:0.8rem;color:var(--gray);text-align:center"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, where, getDocs, writeBatch, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhrkTwtV3Zwbj2k-PCUeXFqaFvtf_UT7s",
  authDomain: "insurance-check-6cec9.firebaseapp.com",
  projectId: "insurance-check-6cec9",
  storageBucket: "insurance-check-6cec9.appspot.com",
  messagingSenderId: "992769471393",
  appId: "1:992769471393:web:c8a9400210a0e7901011e0"
};

let app;
if (getApps().length === 0) { app = initializeApp(firebaseConfig); } else { app = getApp(); }
const db = getFirestore(app);
const auth = getAuth(app);

let allQueue = [];
let filterDoctor = '';
let listenerStarted = false;

const OWNER_EMAILS = ['husseinbabsail@gmail.com', 'hbabsail@hotmail.com'];

async function checkAccess(user) {
  const email = user.email?.toLowerCase();
  if (OWNER_EMAILS.includes(email)) return true;
  try {
    const roleDoc = await getDoc(doc(db, 'staff_roles', user.uid));
    if (!roleDoc.exists()) return false;
    const data = roleDoc.data();
    if (data.status === 'suspended') return false;
    if (['owner', 'admin'].includes(data.role)) return true;
    if ((data.allowedSystems || []).includes('queue')) return true;
    if (data.permissions && data.permissions.queue === true) return true;
    return false;
  } catch (e) {
    console.error('Access check error:', e);
    return false;
  }
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const hasAccess = await checkAccess(user);
    if (hasAccess) {
      document.getElementById('authOverlay')?.remove();
      if (!listenerStarted) {
        listenerStarted = true;
        loadDoctorsFromFirestore();
        startDoctorsListener();
        startQueueListener();
      }
    } else {
      showAccessDenied();
    }
  } else {
    showAuthOverlay();
  }
});

function showAccessDenied() {
  const overlay = document.getElementById('authOverlay') || document.createElement('div');
  overlay.id = 'authOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,22,40,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:white;border-radius:20px;padding:40px;max-width:400px;width:90%;text-align:center;font-family:Tajawal,sans-serif;">
      <i class="fas fa-lock" style="font-size:3rem;color:#ef4444;margin-bottom:15px;"></i>
      <h2 style="color:#1e3a5f;margin-bottom:10px;">غير مصرح</h2>
      <p style="color:#94a3b8;margin-bottom:20px;">ليس لديك صلاحية للوصول لنظام الطوابير</p>
      <a href="admin-login.html" style="display:inline-block;padding:12px 30px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;">العودة</a>
    </div>
  `;
  if (!overlay.parentNode) document.body.appendChild(overlay);
}

function showAuthOverlay() {
  if (document.getElementById('authOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'authOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,22,40,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:white;border-radius:20px;padding:40px;max-width:400px;width:90%;text-align:center;font-family:Tajawal,sans-serif;">
      <img src="https://www.m2020m.org/logo2026.jpg" style="width:80px;border-radius:50%;margin-bottom:15px;border:3px solid #c9a962;">
      <h2 style="color:#1e3a5f;margin-bottom:5px;">نظام الطوابير</h2>
      <p style="color:#94a3b8;margin-bottom:25px;font-size:0.9rem;">سجّل دخولك للمتابعة</p>
      <input type="email" id="authEmail" placeholder="البريد الإلكتروني" style="width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:10px;margin-bottom:10px;font-family:inherit;font-size:1rem;text-align:right;">
      <input type="password" id="authPassword" placeholder="كلمة المرور" style="width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:10px;margin-bottom:15px;font-family:inherit;font-size:1rem;text-align:right;">
      <button id="authLoginBtn" style="width:100%;padding:14px;background:linear-gradient(135deg,#c9a962,#f4d03f);color:#1e3a5f;border:none;border-radius:12px;font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer;">تسجيل الدخول</button>
      <p id="authError" style="color:#ef4444;margin-top:10px;font-size:0.85rem;display:none;"></p>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('authLoginBtn').onclick = async () => {
    const email = document.getElementById('authEmail').value.trim();
    const pass = document.getElementById('authPassword').value;
    const errEl = document.getElementById('authError');
    if (!email || !pass) { errEl.textContent = 'أدخل البريد وكلمة المرور'; errEl.style.display = 'block'; return; }
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      errEl.textContent = 'خطأ في تسجيل الدخول - تحقق من البيانات';
      errEl.style.display = 'block';
    }
  };
  document.getElementById('authPassword')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('authLoginBtn').click();
  });
}

const QUEUE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzEIyoCBc8LNuPfNWxyxhc8yRi5AIfzaZ6Rk0zm6LMOOrp9xXb7NweNzdvTVOOwFCPP9g/exec';
const DOCTORS_KEY = 'queue_doctors_config';
const DOCTORS_DOC_ID = 'doctors_list';

const defaultDoctors = [];

let doctors = [];

async function loadDoctorsFromSheet() {
  try {
    const resp = await fetch(QUEUE_SHEET_URL + '?action=getClinics');
    const result = await resp.json();
    if (result.status === 'success' && result.data && result.data.length > 0) {
      return result.data.map(d => ({
        name: d.name,
        clinic: d.clinic || 'عيادة ' + (d.code || ''),
        active: true
      }));
    }
  } catch (e) {
    console.log('Sheet clinics load error:', e);
  }
  return null;
}

async function loadDoctorsFromFirestore() {
  const sheetDoctors = await loadDoctorsFromSheet();

  if (sheetDoctors && sheetDoctors.length > 0) {
    doctors = sheetDoctors;
    localStorage.setItem(DOCTORS_KEY, JSON.stringify(doctors));
    try {
      await setDoc(doc(db, 'queue_config', DOCTORS_DOC_ID), { doctors });
    } catch (e) {
      console.log('Sync to Firestore error:', e);
    }
    renderDoctorSelect();
    renderDoctorsSetup();
    return;
  }

  try {
    const docRef = doc(db, 'queue_config', DOCTORS_DOC_ID);
    const docSnap = await getDoc(docRef);
    if (docSnap.exists() && docSnap.data().doctors && docSnap.data().doctors.length > 0) {
      doctors = docSnap.data().doctors;
    } else {
      doctors = defaultDoctors;
      if (doctors.length > 0) {
        await setDoc(docRef, { doctors: defaultDoctors });
      }
    }
  } catch (e) {
    console.error('Load doctors error:', e);
    const saved = localStorage.getItem(DOCTORS_KEY);
    doctors = saved ? JSON.parse(saved) : defaultDoctors;
  }
  localStorage.setItem(DOCTORS_KEY, JSON.stringify(doctors));
  renderDoctorSelect();
  renderDoctorsSetup();
}

async function saveDoctors(docs) {
  localStorage.setItem(DOCTORS_KEY, JSON.stringify(docs));
  try {
    await setDoc(doc(db, 'queue_config', DOCTORS_DOC_ID), { doctors: docs });
  } catch (e) {
    console.error('Save doctors error:', e);
  }
}

function startDoctorsListener() {
  onSnapshot(doc(db, 'queue_config', DOCTORS_DOC_ID), (docSnap) => {
    if (docSnap.exists()) {
      doctors = docSnap.data().doctors || [];
      localStorage.setItem(DOCTORS_KEY, JSON.stringify(doctors));
      renderDoctorSelect();
      renderDoctorsSetup();
    }
  });
}

function renderDoctorSelect() {
  const sel = document.getElementById('doctorSelect');
  sel.innerHTML = '<option value="">-- اختر الطبيب --</option>';
  doctors.filter(d => d.active).forEach(d => {
    sel.innerHTML += `<option value="${d.name}">${d.name} - ${d.clinic}</option>`;
  });
}

function renderDoctorsSetup() {
  const el = document.getElementById('doctorsSetup');
  el.innerHTML = doctors.map((d, i) => `
    <div class="doc-setup-item ${d.active ? 'active' : ''}" onclick="toggleDoctor(${i})">
      <div class="doc-status"></div>
      <div>
        <div style="font-weight:700;font-size:0.85rem">${d.name}</div>
        <div style="font-size:0.75rem;color:var(--gray)">${d.clinic}</div>
      </div>
    </div>
  `).join('');
}

window.toggleDoctor = function(idx) {
  doctors[idx].active = !doctors[idx].active;
  saveDoctors(doctors);
  renderDoctorsSetup();
  renderDoctorSelect();
};

window.addDoctor = function() {
  const name = document.getElementById('newDoctorName').value.trim();
  const clinic = document.getElementById('newClinicName').value.trim();
  if (!name) { showToast('أدخل اسم الطبيب', 'error'); return; }
  doctors.push({ name, clinic: clinic || 'عيادة', active: true });
  saveDoctors(doctors);
  renderDoctorsSetup();
  renderDoctorSelect();
  document.getElementById('newDoctorName').value = '';
  document.getElementById('newClinicName').value = '';
  showToast('تم إضافة الطبيب');
};

function getNextNumber() {
  const todayQueue = allQueue.filter(q => {
    const d = q.createdAt?.toDate?.() || new Date(q.createdAt);
    const today = new Date();
    return d.toDateString() === today.toDateString();
  });
  return todayQueue.length + 1;
}

window.addToQueue = async function() {
  const patientName = document.getElementById('patientName').value.trim();
  const doctorName = document.getElementById('doctorSelect').value;
  const fileNumber = document.getElementById('fileNumber').value.trim();

  if (!patientName) { showToast('أدخل اسم المريض', 'error'); return; }
  if (!doctorName) { showToast('اختر الطبيب', 'error'); return; }

  const doctor = doctors.find(d => d.name === doctorName);
  const num = getNextNumber();

  try {
    await addDoc(collection(db, 'queue'), {
      number: num,
      patientName,
      doctorName,
      clinicName: doctor?.clinic || '',
      fileNumber: fileNumber || '',
      status: 'waiting',
      createdAt: serverTimestamp(),
      calledAt: null,
      doneAt: null,
      date: new Date().toISOString().split('T')[0]
    });

    document.getElementById('patientName').value = '';
    document.getElementById('fileNumber').value = '';
    document.getElementById('patientName').focus();
    showToast(`تم إضافة ${patientName} - رقم ${num}`);
  } catch (e) {
    showToast('خطأ في الإضافة: ' + e.message, 'error');
  }
};

window.callPatient = async function(id) {
  try {
    await updateDoc(doc(db, 'queue', id), {
      status: 'called',
      calledAt: serverTimestamp()
    });
    showToast('تم النداء');
  } catch (e) {
    showToast('خطأ: ' + e.message, 'error');
  }
};

window.donePatient = async function(id) {
  try {
    await updateDoc(doc(db, 'queue', id), {
      status: 'done',
      doneAt: serverTimestamp()
    });
  } catch (e) {
    showToast('خطأ: ' + e.message, 'error');
  }
};

window.skipPatient = async function(id) {
  try {
    await updateDoc(doc(db, 'queue', id), {
      status: 'skipped'
    });
    showToast('تم التخطي');
  } catch (e) {
    showToast('خطأ: ' + e.message, 'error');
  }
};

window.recallPatient = async function(id) {
  try {
    await updateDoc(doc(db, 'queue', id), {
      status: 'waiting',
      calledAt: null
    });
    showToast('تم إرجاعه للانتظار');
  } catch (e) {
    showToast('خطأ: ' + e.message, 'error');
  }
};

window.removePatient = async function(id) {
  try {
    await deleteDoc(doc(db, 'queue', id));
  } catch (e) {
    showToast('خطأ: ' + e.message, 'error');
  }
};

window.clearDoneQueue = async function() {
  const doneItems = allQueue.filter(q => q.status === 'done' || q.status === 'skipped');
  if (!doneItems.length) { showToast('لا يوجد منتهين', 'error'); return; }
  const batch = writeBatch(db);
  doneItems.forEach(q => batch.delete(doc(db, 'queue', q.id)));
  await batch.commit();
  showToast(`تم مسح ${doneItems.length} منتهي`);
};

window.setFilterDoctor = function(name) {
  filterDoctor = filterDoctor === name ? '' : name;
  renderQueue();
  renderDoctorFilter();
};

function renderDoctorFilter() {
  const el = document.getElementById('doctorFilter');
  const activeDocs = [...new Set(allQueue.map(q => q.doctorName))];
  el.innerHTML = `<div class="doc-chip ${!filterDoctor ? 'active' : ''}" onclick="setFilterDoctor('')">الكل</div>`;
  activeDocs.forEach(d => {
    const count = allQueue.filter(q => q.doctorName === d && q.status === 'waiting').length;
    el.innerHTML += `<div class="doc-chip ${filterDoctor === d ? 'active' : ''}" onclick="setFilterDoctor('${d}')">${d} (${count})</div>`;
  });
}

function renderQueue() {
  const el = document.getElementById('queueList');
  let list = [...allQueue];

  if (filterDoctor) {
    list = list.filter(q => q.doctorName === filterDoctor);
  }

  const waiting = list.filter(q => q.status === 'waiting');
  const called = list.filter(q => q.status === 'called');
  const done = list.filter(q => q.status === 'done');
  const skipped = list.filter(q => q.status === 'skipped');

  document.getElementById('statWaiting').textContent = allQueue.filter(q => q.status === 'waiting').length;
  document.getElementById('statCalled').textContent = allQueue.filter(q => q.status === 'called').length;
  document.getElementById('statDone').textContent = allQueue.filter(q => q.status === 'done' || q.status === 'skipped').length;
  document.getElementById('queueCount').textContent = allQueue.length + ' مريض';

  const sorted = [...called, ...waiting, ...skipped, ...done];

  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>لا يوجد مرضى في الطابور</p></div>';
    return;
  }

  el.innerHTML = sorted.map(q => {
    const statusClass = q.status === 'called' ? 'called' : q.status === 'done' ? 'done' : '';
    let actions = '';

    if (q.status === 'waiting') {
      actions = `
        <button style="background:var(--gold)" onclick="callPatient('${q.id}')" title="نداء"><i class="fas fa-bullhorn"></i></button>
        <button style="background:#94a3b8" onclick="skipPatient('${q.id}')" title="تخطي"><i class="fas fa-forward"></i></button>
        <button style="background:var(--danger)" onclick="removePatient('${q.id}')" title="حذف"><i class="fas fa-trash"></i></button>
      `;
    } else if (q.status === 'called') {
      actions = `
        <button style="background:var(--success)" onclick="donePatient('${q.id}')" title="منتهي"><i class="fas fa-check"></i></button>
        <button style="background:var(--info)" onclick="callPatient('${q.id}')" title="إعادة نداء"><i class="fas fa-redo"></i></button>
      `;
    } else if (q.status === 'skipped') {
      actions = `
        <button style="background:var(--info)" onclick="recallPatient('${q.id}')" title="إرجاع"><i class="fas fa-undo"></i></button>
        <button style="background:var(--danger)" onclick="removePatient('${q.id}')" title="حذف"><i class="fas fa-trash"></i></button>
      `;
    } else {
      actions = `<span style="color:var(--success);font-weight:900"><i class="fas fa-check-circle"></i></span>`;
    }

    const opacity = (q.status === 'done' || q.status === 'skipped') ? 'opacity:0.5;' : '';

    return `
      <div class="q-item" style="${opacity}">
        <div class="q-item-info">
          <div class="q-num ${statusClass}">${q.number}</div>
          <div>
            <div class="q-name">${q.patientName}</div>
            <div class="q-doctor"><i class="fas fa-stethoscope" style="margin-left:4px"></i>${q.doctorName}</div>
            <div class="q-clinic"><i class="fas fa-door-open" style="margin-left:4px"></i>${q.clinicName}${q.fileNumber ? ' | ملف: ' + q.fileNumber : ''}</div>
          </div>
        </div>
        <div class="q-actions">${actions}</div>
      </div>
    `;
  }).join('');
}

function startQueueListener() {
  const today = new Date().toISOString().split('T')[0];
  const q = query(collection(db, 'queue'), where('date', '==', today), orderBy('createdAt', 'asc'));

  onSnapshot(q, (snapshot) => {
    allQueue = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderQueue();
    renderDoctorFilter();
  }, (error) => {
    console.error('Firestore error:', error);
    if (error.code === 'failed-precondition') {
      const indexQ = query(collection(db, 'queue'), where('date', '==', today));
      onSnapshot(indexQ, (snapshot) => {
        allQueue = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        allQueue.sort((a, b) => {
          const ta = a.createdAt?.toMillis?.() || 0;
          const tb = b.createdAt?.toMillis?.() || 0;
          return ta - tb;
        });
        renderQueue();
        renderDoctorFilter();
      });
    } else {
      showToast('خطأ في الاتصال: ' + error.message, 'error');
    }
  });
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

document.getElementById('patientName').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') window.addToQueue();
});

function setArchiveStatus(msg, isError) {
  const el = document.getElementById('archiveStatus');
  el.textContent = msg;
  el.style.color = isError ? '#ef4444' : '#059669';
}

window.archiveToSheet = async function() {
  if (!allQueue.length) { showToast('لا يوجد مرضى للأرشفة', 'error'); return; }

  setArchiveStatus('جاري الأرشفة...', false);

  const patients = allQueue.map(q => {
    const created = q.createdAt?.toDate?.() || (q.createdAt ? new Date(q.createdAt) : new Date());
    const called = q.calledAt?.toDate?.() || (q.calledAt ? new Date(q.calledAt) : null);
    const done = q.doneAt?.toDate?.() || (q.doneAt ? new Date(q.doneAt) : null);

    const formatDT = (d) => {
      if (!d) return '';
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    };

    let status = q.status || 'waiting';
    if (status === 'done') status = 'completed';

    return {
      ticketNum: q.number || '',
      patientName: q.patientName || '',
      patientPhone: q.fileNumber || '',
      doctorName: q.doctorName || '',
      clinic: q.clinicName || '',
      status,
      addedAt: formatDT(created),
      calledAt: formatDT(called),
      completedAt: formatDT(done),
      addedBy: auth.currentUser?.email || ''
    };
  });

  try {
    const resp = await fetch(QUEUE_SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'logBatch', patients })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      showToast(`تم أرشفة ${result.data.count} مريض بنجاح`);
      setArchiveStatus(`آخر أرشفة: ${new Date().toLocaleTimeString('ar-SA')} - ${result.data.count} مريض`, false);
      loadArchiveStats();
    } else {
      throw new Error(result.message);
    }
  } catch (e) {
    showToast('خطأ في الأرشفة: ' + e.message, 'error');
    setArchiveStatus('فشلت الأرشفة: ' + e.message, true);
  }
};

window.syncDoctorsToSheet = async function() {
  if (!doctors.length) { showToast('لا يوجد أطباء', 'error'); return; }

  setArchiveStatus('جاري حفظ الأطباء...', false);

  try {
    const resp = await fetch(QUEUE_SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveDoctors', doctors })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      showToast(`تم حفظ ${result.data.count} طبيب`);
      setArchiveStatus(`تم حفظ الأطباء: ${result.data.count}`, false);
    } else {
      throw new Error(result.message);
    }
  } catch (e) {
    showToast('خطأ: ' + e.message, 'error');
    setArchiveStatus('فشل حفظ الأطباء', true);
  }
};

window.calcDailyStats = async function() {
  setArchiveStatus('جاري حساب الإحصائيات...', false);

  try {
    const resp = await fetch(QUEUE_SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'calcDailyStats' })
    });
    const result = await resp.json();
    if (result.status === 'success') {
      const d = result.data;
      showToast(`إحصائيات اليوم: ${d.total} مريض | متوسط انتظار: ${d.avgWait} دقيقة`);
      setArchiveStatus(`${d.total} مريض | ${d.completed} منتهي | انتظار: ${d.avgWait} د`, false);
      document.getElementById('archiveAvgWait').textContent = d.avgWait || '0';
    } else {
      throw new Error(result.message);
    }
  } catch (e) {
    showToast('خطأ: ' + e.message, 'error');
    setArchiveStatus('فشل حساب الإحصائيات', true);
  }
};

async function loadArchiveStats() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const resp = await fetch(QUEUE_SHEET_URL + '?action=getLog&date=' + today);
    const result = await resp.json();
    if (result.status === 'success') {
      const log = result.data || [];
      document.getElementById('archiveCount').textContent = log.length;
      const waits = log.map(r => Number(r.waitMinutes)).filter(w => w > 0);
      document.getElementById('archiveAvgWait').textContent = waits.length
        ? Math.round(waits.reduce((a, b) => a + b, 0) / waits.length)
        : '0';
    }
  } catch (e) {
    console.log('Archive stats load error:', e);
  }
}

setTimeout(loadArchiveStats, 3000);
</script>
