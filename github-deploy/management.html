<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ملفات الموظفين - مجمع مكة الطبي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

    .header {
      background: #1e3a5f;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
    }
    .header h1 { font-size: 1.1rem; font-weight: 700; }
    .header a { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
    .header a:hover { opacity: 1; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    .page-title { font-size: 1.2rem; color: #1e3a5f; margin-bottom: 6px; }
    .page-desc { color: #888; font-size: 0.9rem; margin-bottom: 24px; }

    .staff-list { display: flex; flex-direction: column; gap: 8px; }

    .staff-row {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
    }
    .staff-row:hover { background: #f0f4f8; }
    .staff-row .info { display: flex; align-items: center; gap: 12px; }
    .staff-row .icon {
      width: 38px; height: 38px; border-radius: 50%;
      background: #eef2f7; color: #1e3a5f;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
    }
    .staff-row .name { font-size: 0.95rem; font-weight: 700; color: #1e3a5f; }
    .staff-row .role { font-size: 0.8rem; color: #888; }
    .staff-row .badge {
      background: #1e3a5f; color: #fff;
      min-width: 22px; height: 22px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; padding: 0 6px;
    }
    .staff-row .badge.empty { background: #ddd; color: #999; }

    .overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 1000;
      justify-content: center; align-items: flex-start;
      padding: 40px 16px; overflow-y: auto;
    }
    .overlay.active { display: flex; }

    .panel {
      background: #fff; border-radius: 12px; width: 100%; max-width: 600px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .panel-header {
      padding: 18px 22px;
      border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header h3 { font-size: 1.05rem; color: #1e3a5f; }
    .panel-header p { font-size: 0.8rem; color: #888; }
    .panel-close {
      background: none; border: none; font-size: 1.3rem;
      color: #999; cursor: pointer; padding: 4px;
    }
    .panel-close:hover { color: #e74c3c; }

    .panel-body { padding: 20px 22px; }

    .section-label { font-size: 0.9rem; color: #555; margin-bottom: 10px; font-weight: 700; }

    .file-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 6px;
    }
    .file-row .f-info { display: flex; align-items: center; gap: 8px; }
    .file-row .f-icon { color: #c0392b; font-size: 1rem; }
    .file-row .f-icon.img { color: #2980b9; }
    .file-row .f-icon.doc { color: #27ae60; }
    .file-row .f-name { font-size: 0.85rem; color: #333; }
    .file-row .f-date { font-size: 0.75rem; color: #aaa; }
    .file-row a {
      font-size: 0.8rem; color: #1e3a5f; text-decoration: none;
      border: 1px solid #1e3a5f; padding: 4px 10px; border-radius: 4px;
    }
    .file-row a:hover { background: #1e3a5f; color: #fff; }

    .empty-msg {
      text-align: center; padding: 20px; color: #aaa; font-size: 0.9rem;
      border: 1px dashed #ddd; border-radius: 8px;
    }

    .upload-box {
      margin-top: 20px; padding-top: 18px; border-top: 1px solid #eee;
    }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
    .field input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-family: inherit; font-size: 0.9rem; direction: ltr; text-align: right;
    }
    .field input:focus { outline: none; border-color: #1e3a5f; }

    .drop-area {
      border: 2px dashed #ccc; border-radius: 8px; padding: 24px;
      text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 10px;
    }
    .drop-area:hover, .drop-area.over { border-color: #1e3a5f; }
    .drop-area i { font-size: 1.5rem; color: #999; margin-bottom: 6px; }
    .drop-area p { font-size: 0.85rem; color: #999; }
    .drop-area .hint { font-size: 0.75rem; color: #bbb; margin-top: 4px; }
    .drop-area input { display: none; }

    .chosen-files { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .chosen-file {
      display: flex; align-items: center; justify-content: space-between;
      background: #f9f9f9; padding: 8px 10px; border-radius: 4px; font-size: 0.85rem;
    }
    .chosen-file button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.9rem; }

    .btn-upload {
      width: 100%; padding: 12px; background: #1e3a5f; color: #fff; border: none;
      border-radius: 6px; font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-upload:hover { background: #2d5a8a; }
    .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-msg {
      margin-top: 10px; padding: 10px; border-radius: 6px;
      font-size: 0.85rem; text-align: center; display: none;
    }
    .status-msg.ok { display: block; background: #e8f5e9; color: #2e7d32; }
    .status-msg.err { display: block; background: #ffeef0; color: #c62828; }
    .status-msg.wait { display: block; background: #e3f2fd; color: #1565c0; }

    .spinner { text-align: center; padding: 20px; color: #888; }

    @media (max-width: 600px) {
      .container { padding: 16px 10px; }
      .panel-body { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1><i class="fas fa-folder-open"></i> ملفات الموظفين</h1>
  <a href="https://m2020m.org"><i class="fas fa-home"></i> الرئيسية</a>
</div>

<div class="container">
  <h2 class="page-title">فريق العمل</h2>
  <p class="page-desc">اضغط على الاسم لعرض الملفات أو رفع ملفات جديدة</p>
  <div class="staff-list" id="staffList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <div class="panel-header">
      <div>
        <h3 id="pName"></h3>
        <p id="pRole"></p>
      </div>
      <button class="panel-close" onclick="closePanel()">&times;</button>
    </div>
    <div class="panel-body">
      <div class="section-label"><i class="fas fa-folder"></i> الملفات</div>
      <div id="filesList"></div>

      <div class="upload-box">
        <div class="section-label"><i class="fas fa-upload"></i> رفع ملفات</div>
        <div class="field">
          <label>الرقم السري</label>
          <input type="password" id="pass" placeholder="أدخل الرقم السري">
        </div>
        <div class="drop-area" id="dropArea" onclick="document.getElementById('fInput').click()">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>اسحب الملفات هنا أو اضغط للاختيار</p>
          <p class="hint">PDF, صور, Word, Excel - حد أقصى 10 ميجا</p>
          <input type="file" id="fInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx">
        </div>
        <div class="chosen-files" id="chosenFiles"></div>
        <button class="btn-upload" id="btnUpload" onclick="doUpload()" disabled>
          <i class="fas fa-upload"></i> رفع الملفات
        </button>
        <div class="status-msg" id="statusMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyGmEigQjpBbJPwQgBlHfTWZFv74_tsJtPCerR7A0QTdl4AhInv68Hb67-S1ng4nm5v/exec';

const staff = [
  { name: 'د. حسين بابصيل', role: 'المدير العام / المالك', icon: 'fa-user-shield' },
  { name: 'أ. بلال نتو', role: 'المدير الإداري والتنفيذي', icon: 'fa-user-tie' },
  { name: 'د. معاذ', role: 'المدير الطبي', icon: 'fa-user-md' },
  { name: 'د. خالد', role: 'نائب المدير الطبي', icon: 'fa-user-md' },
  { name: 'أ. صابر سعيد', role: 'الشؤون المالية والتأمين', icon: 'fa-calculator' },
  { name: 'أ. عدنان الرفاعي', role: 'الصيانة والمشتريات', icon: 'fa-tools' },
  { name: 'أ. عبدالله حموده', role: 'الصيدلية', icon: 'fa-pills' },
  { name: 'د. مجدي عسكر', role: 'التعقيم ومكافحة العدوى', icon: 'fa-shield-virus' },
  { name: 'نور', role: 'مشرف النظافة', icon: 'fa-broom' }
];

let cur = null, picked = [], counts = {};

function render() {
  document.getElementById('staffList').innerHTML = staff.map((s, i) => `
    <div class="staff-row" onclick="open(${i})">
      <div class="info">
        <div class="icon"><i class="fas ${s.icon}"></i></div>
        <div><div class="name">${s.name}</div><div class="role">${s.role}</div></div>
      </div>
      <div class="badge ${(counts[s.name]||0) === 0 ? 'empty' : ''}" id="b${i}">${counts[s.name]||0}</div>
    </div>
  `).join('');
}

function open(i) {
  cur = staff[i];
  document.getElementById('pName').textContent = cur.name;
  document.getElementById('pRole').textContent = cur.role;
  document.getElementById('overlay').classList.add('active');
  document.getElementById('pass').value = '';
  document.getElementById('statusMsg').className = 'status-msg';
  picked = [];
  renderPicked();
  loadFiles(cur.name);
}

function closePanel() {
  document.getElementById('overlay').classList.remove('active');
  cur = null;
}
document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) closePanel(); });

async function apiFetch(url) {
  const r = await fetch(url, { redirect: 'follow' });
  const t = await r.text();
  try { return JSON.parse(t); } catch(e) {
    const m = t.match(/\{[\s\S]*\}/);
    return m ? JSON.parse(m[0]) : { success: false };
  }
}

async function apiPost(data) {
  const r = await fetch(API, { method: 'POST', body: JSON.stringify(data), redirect: 'follow' });
  const t = await r.text();
  console.log('[API POST] response:', t.substring(0, 300));
  try { return JSON.parse(t); } catch(e) {
    const m = t.match(/\{[\s\S]*\}/);
    return m ? JSON.parse(m[0]) : { success: false, error: 'استجابة غير صالحة' };
  }
}

async function loadFiles(name) {
  const el = document.getElementById('filesList');
  el.innerHTML = '<div class="spinner"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
  try {
    const data = await apiFetch(API + '?action=getFiles&name=' + encodeURIComponent(name));
    if (data.success && data.files && data.files.length > 0) {
      counts[name] = data.files.length;
      updateBadges();
      el.innerHTML = data.files.map(f => {
        const ext = (f.fileName || '').split('.').pop().toLowerCase();
        let ic = 'fa-file', cls = '';
        if (ext === 'pdf') { ic = 'fa-file-pdf'; cls = ''; }
        else if (['jpg','jpeg','png'].includes(ext)) { ic = 'fa-file-image'; cls = 'img'; }
        else if (['doc','docx','xls','xlsx'].includes(ext)) { ic = 'fa-file-alt'; cls = 'doc'; }
        return `<div class="file-row">
          <div class="f-info">
            <i class="fas ${ic} f-icon ${cls}"></i>
            <div><div class="f-name">${f.fileName}</div><div class="f-date">${f.uploadDate||''}</div></div>
          </div>
          <a href="${f.fileUrl}" target="_blank">فتح</a>
        </div>`;
      }).join('');
    } else {
      counts[name] = 0; updateBadges();
      el.innerHTML = '<div class="empty-msg">لا توجد ملفات</div>';
    }
  } catch(e) {
    el.innerHTML = '<div class="empty-msg" style="color:#c62828;">خطأ في تحميل الملفات</div>';
  }
}

function updateBadges() {
  staff.forEach((s, i) => {
    const el = document.getElementById('b' + i);
    if (el) {
      const c = counts[s.name] || 0;
      el.textContent = c;
      el.className = 'badge' + (c === 0 ? ' empty' : '');
    }
  });
}

const dropArea = document.getElementById('dropArea');
const fInput = document.getElementById('fInput');
dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('over'));
dropArea.addEventListener('drop', e => { e.preventDefault(); dropArea.classList.remove('over'); addFiles(e.dataTransfer.files); });
fInput.addEventListener('change', e => { addFiles(e.target.files); fInput.value = ''; });

function addFiles(files) {
  for (const f of files) {
    if (f.size > 10*1024*1024) { alert(f.name + ' أكبر من 10 ميجا'); continue; }
    if (!picked.find(p => p.name === f.name)) picked.push(f);
  }
  renderPicked();
}

function renderPicked() {
  const c = document.getElementById('chosenFiles');
  document.getElementById('btnUpload').disabled = picked.length === 0;
  if (!picked.length) { c.innerHTML = ''; return; }
  c.innerHTML = picked.map((f, i) => `
    <div class="chosen-file">
      <span><i class="fas fa-file" style="color:#1e3a5f;margin-left:6px;"></i>${f.name} (${(f.size/1024).toFixed(0)} KB)</span>
      <button onclick="picked.splice(${i},1);renderPicked();">&times;</button>
    </div>
  `).join('');
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function doUpload() {
  const pass = document.getElementById('pass').value.trim();
  const st = document.getElementById('statusMsg');
  const btn = document.getElementById('btnUpload');
  if (!pass) { st.className = 'status-msg err'; st.textContent = 'أدخل الرقم السري'; return; }
  if (!picked.length) return;

  btn.disabled = true;
  let ok = 0, fail = 0;
  for (let i = 0; i < picked.length; i++) {
    st.className = 'status-msg wait';
    st.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري رفع ' + picked[i].name + '...';
    try {
      const b64 = await toBase64(picked[i]);
      const res = await apiPost({
        action: 'uploadFile',
        password: pass,
        staffName: cur.name,
        fileName: picked[i].name,
        mimeType: picked[i].type || 'application/octet-stream',
        fileData: b64
      });
      if (res.success) { ok++; }
      else {
        fail++;
        if (res.error === 'WRONG_PASSWORD') {
          st.className = 'status-msg err'; st.textContent = 'الرقم السري غير صحيح';
          btn.disabled = false; return;
        }
        st.className = 'status-msg err'; st.textContent = 'خطأ: ' + (res.error || 'غير معروف');
      }
    } catch(e) {
      fail++;
      console.error('[Upload]', e);
      st.className = 'status-msg err'; st.textContent = 'خطأ في الاتصال';
    }
  }
  if (ok > 0) {
    st.className = 'status-msg ok';
    st.textContent = 'تم رفع ' + ok + ' ملف بنجاح';
    picked = []; renderPicked();
    await loadFiles(cur.name);
  }
  btn.disabled = false;
}

async function loadCounts() {
  try {
    const data = await apiFetch(API + '?action=getAllCounts');
    if (data.success && data.counts) { counts = data.counts; updateBadges(); }
  } catch(e) {}
}

render();
loadCounts();
</script>
</body>
</html>
