<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ملفات الموظفين - مجمع مكة الطبي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

    .header {
      background: #1e3a5f;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      color: #fff;
    }
    .header h1 { font-size: 1.1rem; font-weight: 700; }
    .header a { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
    .header a:hover { opacity: 1; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    .page-title { font-size: 1.2rem; color: #1e3a5f; margin-bottom: 6px; }
    .page-desc { color: #888; font-size: 0.9rem; margin-bottom: 24px; }

    .staff-list { display: flex; flex-direction: column; gap: 8px; }

    .staff-row {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
      padding: 14px 18px; display: flex; align-items: center;
      cursor: pointer; transition: background 0.15s; user-select: none;
    }
    .staff-row:hover { background: #f0f4f8; }
    .staff-row:active { background: #e4eaf0; }
    .staff-row .info { display: flex; align-items: center; gap: 12px; flex: 1; }
    .staff-row .icon {
      width: 38px; height: 38px; border-radius: 50%;
      background: #eef2f7; color: #1e3a5f;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; flex-shrink: 0;
    }
    .staff-row .name { font-size: 0.95rem; font-weight: 700; color: #1e3a5f; }
    .staff-row .role { font-size: 0.8rem; color: #888; }
    .staff-row .arrow { color: #bbb; font-size: 0.8rem; }

    .overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 1000;
      justify-content: center; align-items: flex-start;
      padding: 40px 16px; overflow-y: auto;
    }
    .overlay.active { display: flex; }

    .panel {
      background: #fff; border-radius: 12px; width: 100%; max-width: 600px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .panel-header {
      padding: 18px 22px; border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header h3 { font-size: 1.05rem; color: #1e3a5f; }
    .panel-header p { font-size: 0.8rem; color: #888; }
    .panel-close {
      background: none; border: none; font-size: 1.3rem;
      color: #999; cursor: pointer; padding: 4px;
    }
    .panel-close:hover { color: #e74c3c; }

    .panel-body { padding: 20px 22px; }
    .section-label { font-size: 0.9rem; color: #555; margin-bottom: 10px; font-weight: 700; }

    .file-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 6px;
    }
    .file-row .f-info { display: flex; align-items: center; gap: 8px; }
    .file-row .f-icon { font-size: 1rem; }
    .file-row .f-icon.pdf { color: #c0392b; }
    .file-row .f-icon.img { color: #2980b9; }
    .file-row .f-icon.doc { color: #27ae60; }
    .file-row .f-name { font-size: 0.85rem; color: #333; }
    .file-row .f-date { font-size: 0.75rem; color: #aaa; }
    .file-row a {
      font-size: 0.8rem; color: #1e3a5f; text-decoration: none;
      border: 1px solid #1e3a5f; padding: 4px 10px; border-radius: 4px;
    }
    .file-row a:hover { background: #1e3a5f; color: #fff; }

    .empty-msg {
      text-align: center; padding: 20px; color: #aaa; font-size: 0.9rem;
      border: 1px dashed #ddd; border-radius: 8px;
    }

    .upload-box { margin-top: 20px; padding-top: 18px; border-top: 1px solid #eee; }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
    .field input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-family: inherit; font-size: 0.9rem; direction: ltr; text-align: right;
    }
    .field input:focus { outline: none; border-color: #1e3a5f; }

    .drop-area {
      border: 2px dashed #ccc; border-radius: 8px; padding: 24px;
      text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 10px;
    }
    .drop-area:hover, .drop-area.over { border-color: #1e3a5f; background: #f8fafc; }
    .drop-area i { font-size: 1.5rem; color: #999; margin-bottom: 6px; }
    .drop-area p { font-size: 0.85rem; color: #999; }
    .drop-area .hint { font-size: 0.75rem; color: #bbb; margin-top: 4px; }
    .drop-area input { display: none; }

    .chosen-files { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .chosen-file {
      display: flex; align-items: center; justify-content: space-between;
      background: #f9f9f9; padding: 8px 10px; border-radius: 4px; font-size: 0.85rem;
    }
    .chosen-file button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.9rem; }

    .btn-upload {
      width: 100%; padding: 12px; background: #1e3a5f; color: #fff; border: none;
      border-radius: 6px; font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-upload:hover { background: #2d5a8a; }
    .btn-upload:active { transform: scale(0.98); background: #163050; }
    .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-upload.uploading {
      background: #2980b9;
      pointer-events: none;
    }

    .status-msg {
      margin-top: 10px; padding: 10px; border-radius: 6px;
      font-size: 0.85rem; text-align: center; display: none;
    }
    .status-msg.ok { display: block; background: #e8f5e9; color: #2e7d32; }
    .status-msg.err { display: block; background: #ffeef0; color: #c62828; }
    .status-msg.wait { display: block; background: #e3f2fd; color: #1565c0; }

    .spinner { text-align: center; padding: 20px; color: #888; }

    @media (max-width: 600px) {
      .container { padding: 16px 10px; }
      .panel-body { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1><i class="fas fa-folder-open"></i> ملفات الموظفين</h1>
  <a href="https://m2020m.org"><i class="fas fa-home"></i> الرئيسية</a>
</div>

<div class="container">
  <h2 class="page-title">فريق العمل</h2>
  <p class="page-desc">اضغط على الاسم لعرض الملفات أو رفع ملفات جديدة</p>
  <div class="staff-list" id="staffList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <div class="panel-header">
      <div>
        <h3 id="pName"></h3>
        <p id="pRole"></p>
      </div>
      <button class="panel-close" onclick="closePanel()">&times;</button>
    </div>
    <div class="panel-body">
      <div class="section-label"><i class="fas fa-folder"></i> الملفات</div>
      <div id="filesList"></div>

      <div class="upload-box">
        <div class="section-label"><i class="fas fa-upload"></i> رفع ملفات</div>
        <div class="field">
          <label>الرقم السري</label>
          <input type="password" id="pass" placeholder="أدخل الرقم السري">
        </div>
        <div class="drop-area" id="dropArea">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>اسحب الملفات هنا أو اضغط للاختيار</p>
          <p class="hint">PDF, صور, Word, Excel - حد أقصى 10 ميجا</p>
          <input type="file" id="fInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx">
        </div>
        <div class="chosen-files" id="chosenFiles"></div>
        <button class="btn-upload" id="btnUpload" disabled>
          <i class="fas fa-upload"></i> رفع الملفات
        </button>
        <div class="status-msg" id="statusMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbyGmEigQjpBbJPwQgBlHfTWZFv74_tsJtPCerR7A0QTdl4AhInv68Hb67-S1ng4nm5v/exec';

var staffList = [
  { name: 'د. حسين بابصيل', role: 'المدير العام / المالك', icon: 'fa-user-shield' },
  { name: 'أ. بلال نتو', role: 'المدير الإداري والتنفيذي', icon: 'fa-user-tie' },
  { name: 'د. معاذ', role: 'المدير الطبي', icon: 'fa-user-md' },
  { name: 'د. خالد', role: 'نائب المدير الطبي', icon: 'fa-user-md' },
  { name: 'أ. صابر سعيد', role: 'الشؤون المالية والتأمين', icon: 'fa-calculator' },
  { name: 'أ. عدنان الرفاعي', role: 'الصيانة والمشتريات', icon: 'fa-tools' },
  { name: 'أ. عبدالله حموده', role: 'الصيدلية', icon: 'fa-pills' },
  { name: 'د. مجدي عسكر', role: 'التعقيم ومكافحة العدوى', icon: 'fa-shield-virus' },
  { name: 'نور', role: 'مشرف النظافة', icon: 'fa-broom' }
];

var currentPerson = null;
var pickedFiles = [];

function renderList() {
  var html = '';
  for (var i = 0; i < staffList.length; i++) {
    var s = staffList[i];
    html += '<div class="staff-row" onclick="openPerson(' + i + ')">';
    html += '  <div class="info">';
    html += '    <div class="icon"><i class="fas ' + s.icon + '"></i></div>';
    html += '    <div><div class="name">' + s.name + '</div><div class="role">' + s.role + '</div></div>';
    html += '  </div>';
    html += '  <div class="arrow"><i class="fas fa-chevron-left"></i></div>';
    html += '</div>';
  }
  document.getElementById('staffList').innerHTML = html;
}

function openPerson(i) {
  currentPerson = staffList[i];
  document.getElementById('pName').textContent = currentPerson.name;
  document.getElementById('pRole').textContent = currentPerson.role;
  document.getElementById('overlay').classList.add('active');
  document.getElementById('pass').value = '';
  var st = document.getElementById('statusMsg');
  st.className = 'status-msg';
  st.style.display = 'none';
  pickedFiles = [];
  showPicked();
  loadFiles(currentPerson.name);
}

function closePanel() {
  document.getElementById('overlay').classList.remove('active');
  currentPerson = null;
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closePanel();
});

function apiFetch(url, callback) {
  console.log('[API] GET:', url);
  fetch(url, { redirect: 'follow' })
    .then(function(r) { return r.text(); })
    .then(function(t) {
      console.log('[API] Response:', t.substring(0, 200));
      var data;
      try { data = JSON.parse(t); } catch(e) {
        var m = t.match(/\{[\s\S]*\}/);
        data = m ? JSON.parse(m[0]) : { success: false };
      }
      callback(null, data);
    })
    .catch(function(err) {
      console.error('[API] Error:', err);
      callback(err, null);
    });
}

function apiPost(payload, callback) {
  console.log('[API] POST:', payload.action);
  fetch(API, {
    method: 'POST',
    body: JSON.stringify(payload),
    redirect: 'follow'
  })
    .then(function(r) { return r.text(); })
    .then(function(t) {
      console.log('[API] POST Response:', t.substring(0, 300));
      var data;
      try { data = JSON.parse(t); } catch(e) {
        var m = t.match(/\{[\s\S]*\}/);
        data = m ? JSON.parse(m[0]) : { success: false, error: 'استجابة غير صالحة' };
      }
      callback(null, data);
    })
    .catch(function(err) {
      console.error('[API] POST Error:', err);
      callback(err, null);
    });
}

function loadFiles(name) {
  var el = document.getElementById('filesList');
  el.innerHTML = '<div class="spinner"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';

  apiFetch(API + '?action=getFiles&name=' + encodeURIComponent(name), function(err, data) {
    if (err) {
      el.innerHTML = '<div class="empty-msg" style="color:#c62828;">خطأ في تحميل الملفات</div>';
      return;
    }
    if (data.success && data.files && data.files.length > 0) {
      var html = '';
      for (var i = 0; i < data.files.length; i++) {
        var f = data.files[i];
        var ext = (f.fileName || '').split('.').pop().toLowerCase();
        var ic = 'fa-file', cls = '';
        if (ext === 'pdf') { ic = 'fa-file-pdf'; cls = 'pdf'; }
        else if (['jpg','jpeg','png'].indexOf(ext) >= 0) { ic = 'fa-file-image'; cls = 'img'; }
        else if (['doc','docx','xls','xlsx'].indexOf(ext) >= 0) { ic = 'fa-file-alt'; cls = 'doc'; }
        html += '<div class="file-row">';
        html += '  <div class="f-info"><i class="fas ' + ic + ' f-icon ' + cls + '"></i>';
        html += '    <div><div class="f-name">' + f.fileName + '</div><div class="f-date">' + (f.uploadDate || '') + '</div></div>';
        html += '  </div>';
        html += '  <a href="' + f.fileUrl + '" target="_blank">فتح</a>';
        html += '</div>';
      }
      el.innerHTML = html;
    } else {
      el.innerHTML = '<div class="empty-msg">لا توجد ملفات</div>';
    }
  });
}

var dropArea = document.getElementById('dropArea');
var fInput = document.getElementById('fInput');

dropArea.addEventListener('click', function() {
  fInput.click();
});
dropArea.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropArea.classList.add('over');
});
dropArea.addEventListener('dragleave', function() {
  dropArea.classList.remove('over');
});
dropArea.addEventListener('drop', function(e) {
  e.preventDefault();
  dropArea.classList.remove('over');
  addFiles(e.dataTransfer.files);
});
fInput.addEventListener('change', function() {
  addFiles(fInput.files);
  fInput.value = '';
});

function addFiles(files) {
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (f.size > 10 * 1024 * 1024) {
      alert(f.name + ' أكبر من 10 ميجا');
      continue;
    }
    var exists = false;
    for (var j = 0; j < pickedFiles.length; j++) {
      if (pickedFiles[j].name === f.name) { exists = true; break; }
    }
    if (!exists) pickedFiles.push(f);
  }
  showPicked();
}

function removePicked(idx) {
  pickedFiles.splice(idx, 1);
  showPicked();
}

function showPicked() {
  var c = document.getElementById('chosenFiles');
  var btn = document.getElementById('btnUpload');
  btn.disabled = pickedFiles.length === 0;
  if (pickedFiles.length === 0) { c.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < pickedFiles.length; i++) {
    var f = pickedFiles[i];
    html += '<div class="chosen-file">';
    html += '  <span><i class="fas fa-file" style="color:#1e3a5f;margin-left:6px;"></i>' + f.name + ' (' + (f.size / 1024).toFixed(0) + ' KB)</span>';
    html += '  <button onclick="removePicked(' + i + ')">&times;</button>';
    html += '</div>';
  }
  c.innerHTML = html;
}

function toBase64(file, callback) {
  var reader = new FileReader();
  reader.onload = function() {
    callback(reader.result.split(',')[1]);
  };
  reader.onerror = function() { callback(null); };
  reader.readAsDataURL(file);
}

document.getElementById('btnUpload').addEventListener('click', function() {
  doUpload();
});

function doUpload() {
  var pass = document.getElementById('pass').value.trim();
  var st = document.getElementById('statusMsg');
  var btn = document.getElementById('btnUpload');

  if (!pass) {
    st.className = 'status-msg err';
    st.textContent = 'أدخل الرقم السري';
    return;
  }
  if (pickedFiles.length === 0) return;

  btn.disabled = true;
  btn.classList.add('uploading');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';

  var totalFiles = pickedFiles.length;
  var okCount = 0;
  var failCount = 0;
  var index = 0;

  function uploadNext() {
    if (index >= totalFiles) {
      btn.classList.remove('uploading');
      btn.innerHTML = '<i class="fas fa-upload"></i> رفع الملفات';
      btn.disabled = false;

      if (okCount > 0) {
        st.className = 'status-msg ok';
        st.textContent = 'تم رفع ' + okCount + ' ملف بنجاح';
        pickedFiles = [];
        showPicked();
        loadFiles(currentPerson.name);
      } else {
        st.className = 'status-msg err';
        st.textContent = 'فشل رفع الملفات';
      }
      return;
    }

    var file = pickedFiles[index];
    st.className = 'status-msg wait';
    st.textContent = 'جاري رفع: ' + file.name + ' (' + (index + 1) + '/' + totalFiles + ')';

    toBase64(file, function(b64) {
      if (!b64) {
        failCount++;
        index++;
        uploadNext();
        return;
      }

      apiPost({
        action: 'uploadFile',
        password: pass,
        staffName: currentPerson.name,
        fileName: file.name,
        mimeType: file.type || 'application/octet-stream',
        fileData: b64
      }, function(err, res) {
        if (err) {
          failCount++;
        } else if (res && res.success) {
          okCount++;
        } else if (res && res.error === 'WRONG_PASSWORD') {
          st.className = 'status-msg err';
          st.textContent = 'الرقم السري غير صحيح';
          btn.classList.remove('uploading');
          btn.innerHTML = '<i class="fas fa-upload"></i> رفع الملفات';
          btn.disabled = false;
          return;
        } else {
          failCount++;
          st.className = 'status-msg err';
          st.textContent = 'خطأ: ' + ((res && res.error) || 'غير معروف');
        }
        index++;
        uploadNext();
      });
    });
  }

  uploadNext();
}

renderList();
</script>
</body>
</html>
