<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة ملفات الموظفين - مجمع مكة الطبي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f2847 100%);
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #c9a962;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .header-title img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }
    .header-title h1 {
      font-size: 1.4rem;
      color: #c9a962;
    }
    .header-title p {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .header-back {
      background: rgba(201, 169, 98, 0.15);
      border: 1px solid #c9a962;
      color: #c9a962;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s;
    }
    .header-back:hover {
      background: #c9a962;
      color: #1e3a5f;
    }

    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .section-title {
      text-align: center;
      margin-bottom: 30px;
    }
    .section-title h2 {
      font-size: 1.8rem;
      color: #c9a962;
      margin-bottom: 8px;
    }
    .section-title p {
      color: #94a3b8;
      font-size: 1rem;
    }

    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .staff-card {
      background: linear-gradient(145deg, #1e293b, #1a2332);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .staff-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 4px;
      height: 100%;
      background: var(--card-color, #c9a962);
      border-radius: 0 16px 16px 0;
    }
    .staff-card:hover {
      transform: translateY(-5px);
      border-color: var(--card-color, #c9a962);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .staff-card .card-icon {
      width: 55px;
      height: 55px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 15px;
      background: rgba(201, 169, 98, 0.1);
      color: var(--card-color, #c9a962);
    }
    .staff-card h3 {
      font-size: 1.15rem;
      color: #f1f5f9;
      margin-bottom: 6px;
    }
    .staff-card .role {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 10px;
    }
    .staff-card .dept {
      display: inline-block;
      background: rgba(201, 169, 98, 0.1);
      color: var(--card-color, #c9a962);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
    }
    .staff-card .file-count {
      position: absolute;
      top: 15px;
      left: 15px;
      background: var(--card-color, #c9a962);
      color: #1e293b;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .staff-card .file-count.has-files {
      opacity: 1;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
      overflow-y: auto;
    }
    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1e293b;
      border-radius: 20px;
      width: 100%;
      max-width: 700px;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      padding: 25px 30px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header .person-info h3 {
      font-size: 1.3rem;
      color: #c9a962;
    }
    .modal-header .person-info p {
      font-size: 0.9rem;
      color: #94a3b8;
    }
    .modal-close {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .modal-close:hover {
      background: #ef4444;
      color: white;
    }

    .modal-body {
      padding: 25px 30px;
    }

    .files-section {
      margin-bottom: 25px;
    }
    .files-section h4 {
      font-size: 1.1rem;
      color: #e2e8f0;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .files-section h4 i {
      color: #c9a962;
    }

    .files-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .file-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
    }
    .file-item:hover {
      border-color: #c9a962;
    }
    .file-item .file-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .file-item .file-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .file-icon.pdf { background: rgba(239,68,68,0.15); color: #ef4444; }
    .file-icon.image { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .file-icon.doc { background: rgba(34,197,94,0.15); color: #22c55e; }
    .file-icon.other { background: rgba(168,85,247,0.15); color: #a855f7; }
    .file-item .file-name {
      font-size: 0.95rem;
      color: #e2e8f0;
    }
    .file-item .file-date {
      font-size: 0.8rem;
      color: #64748b;
    }
    .file-item .file-actions a {
      background: rgba(201,169,98,0.1);
      border: 1px solid rgba(201,169,98,0.3);
      color: #c9a962;
      padding: 6px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.3s;
      font-family: inherit;
    }
    .file-item .file-actions a:hover {
      background: #c9a962;
      color: #1e293b;
    }

    .no-files {
      text-align: center;
      padding: 30px;
      background: #0f172a;
      border-radius: 12px;
      border: 2px dashed #334155;
    }
    .no-files i {
      font-size: 2.5rem;
      color: #475569;
      margin-bottom: 12px;
    }
    .no-files p {
      color: #64748b;
      font-size: 1rem;
    }

    .upload-section {
      background: linear-gradient(145deg, #0f172a, #131c2e);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 25px;
    }
    .upload-section h4 {
      font-size: 1.1rem;
      color: #c9a962;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upload-password {
      margin-bottom: 15px;
    }
    .upload-password label {
      display: block;
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .upload-password input {
      width: 100%;
      padding: 12px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 1rem;
      direction: ltr;
      text-align: right;
    }
    .upload-password input:focus {
      outline: none;
      border-color: #c9a962;
      box-shadow: 0 0 0 3px rgba(201,169,98,0.15);
    }

    .drop-zone {
      border: 2px dashed #475569;
      border-radius: 14px;
      padding: 35px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #c9a962;
      background: rgba(201,169,98,0.05);
    }
    .drop-zone i {
      font-size: 2.2rem;
      color: #c9a962;
      margin-bottom: 10px;
    }
    .drop-zone p {
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .drop-zone .hint {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 8px;
    }
    .drop-zone input[type="file"] {
      display: none;
    }

    .selected-files {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 15px;
    }
    .selected-file {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
    }
    .selected-file .sf-name {
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .selected-file .sf-remove {
      color: #ef4444;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 1rem;
    }

    .upload-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #c9a962, #b8943f);
      color: #1e293b;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201,169,98,0.3);
    }
    .upload-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .upload-status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
      text-align: center;
    }
    .upload-status.success {
      display: block;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #22c55e;
    }
    .upload-status.error {
      display: block;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
    }
    .upload-status.loading {
      display: block;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: #3b82f6;
    }

    .loading-spinner {
      text-align: center;
      padding: 30px;
    }
    .loading-spinner i {
      font-size: 2rem;
      color: #c9a962;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .header { flex-direction: column; gap: 10px; text-align: center; }
      .header-title { flex-direction: column; }
      .staff-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
      .staff-card { padding: 18px; }
      .modal-body { padding: 20px; }
      .modal-header { padding: 20px; }
      .section-title h2 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <img src="https://m2020m.org/logo-transparent.png" alt="Logo" onerror="this.style.display='none'">
    <div>
      <h1>نظام إدارة ملفات الموظفين</h1>
      <p>مجمع مكة الطبي بالزاهر</p>
    </div>
  </div>
  <a href="https://m2020m.org" class="header-back">
    <i class="fas fa-home"></i> الرئيسية
  </a>
</div>

<div class="main-container">
  <div class="section-title">
    <h2><i class="fas fa-users"></i> فريق العمل</h2>
    <p>اضغط على اسم الموظف لعرض ملفاته أو رفع ملفات جديدة</p>
  </div>

  <div class="staff-grid" id="staffGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="person-info">
        <h3 id="modalName"></h3>
        <p id="modalRole"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="files-section">
        <h4><i class="fas fa-folder-open"></i> الملفات المرفوعة</h4>
        <div id="filesList"></div>
      </div>

      <div class="upload-section">
        <h4><i class="fas fa-cloud-upload-alt"></i> رفع ملفات جديدة</h4>
        
        <div class="upload-password">
          <label>الرقم السري</label>
          <input type="password" id="uploadPassword" placeholder="أدخل الرقم السري للرفع">
        </div>

        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>اسحب الملفات هنا أو اضغط للاختيار</p>
          <p class="hint">PDF, صور, Word, Excel - الحد الأقصى 10 ميجا لكل ملف</p>
          <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx,.ppt,.pptx">
        </div>

        <div class="selected-files" id="selectedFiles"></div>

        <button class="upload-btn" id="uploadBtn" onclick="uploadFiles()" disabled>
          <i class="fas fa-upload"></i>
          <span>رفع الملفات</span>
        </button>

        <div class="upload-status" id="uploadStatus"></div>
      </div>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGmEigQjpBbJPwQgBlHfTWZFv74_tsJtPCerR7A0QTdl4AhInv68Hb67-S1ng4nm5v/exec';

const staffMembers = [
  { name: 'د. حسين بابصيل', role: 'المالك والمدير العام', dept: 'الإدارة العليا', icon: 'fa-crown', color: '#c9a962' },
  { name: 'أ. بلال نتو', role: 'المدير الإداري والتنفيذي', dept: 'الإدارة التنفيذية', icon: 'fa-user-tie', color: '#3b82f6' },
  { name: 'د. معاذ', role: 'المدير الطبي', dept: 'الشؤون الطبية', icon: 'fa-user-md', color: '#10b981' },
  { name: 'د. خالد', role: 'نائب المدير الطبي', dept: 'الشؤون الطبية', icon: 'fa-user-md', color: '#10b981' },
  { name: 'أ. صابر سعيد', role: 'الشؤون المالية والتأمين', dept: 'المالية', icon: 'fa-calculator', color: '#f59e0b' },
  { name: 'أ. عدنان الرفاعي', role: 'الصيانة والتشغيل والمشتريات', dept: 'الصيانة', icon: 'fa-tools', color: '#ef4444' },
  { name: 'أ. عبدالله حموده', role: 'الصيدلية', dept: 'الصيدلة', icon: 'fa-pills', color: '#8b5cf6' },
  { name: 'د. مجدي عسكر', role: 'التعقيم ومكافحة العدوى', dept: 'مكافحة العدوى', icon: 'fa-shield-virus', color: '#06b6d4' },
  { name: 'نور', role: 'مشرف النظافة', dept: 'الخدمات المساندة', icon: 'fa-broom', color: '#64748b' }
];

let currentStaff = null;
let selectedFilesArr = [];
let fileCounts = {};

function renderStaffGrid() {
  const grid = document.getElementById('staffGrid');
  grid.innerHTML = staffMembers.map((s, i) => `
    <div class="staff-card" style="--card-color: ${s.color}" onclick="openModal(${i})">
      <div class="file-count ${(fileCounts[s.name] || 0) > 0 ? 'has-files' : ''}" id="count_${i}">
        ${fileCounts[s.name] || 0}
      </div>
      <div class="card-icon">
        <i class="fas ${s.icon}"></i>
      </div>
      <h3>${s.name}</h3>
      <div class="role">${s.role}</div>
      <div class="dept">${s.dept}</div>
    </div>
  `).join('');
}

async function openModal(index) {
  currentStaff = staffMembers[index];
  document.getElementById('modalName').textContent = currentStaff.name;
  document.getElementById('modalRole').textContent = currentStaff.role + ' - ' + currentStaff.dept;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('uploadPassword').value = '';
  document.getElementById('uploadStatus').className = 'upload-status';
  document.getElementById('uploadStatus').style.display = 'none';
  selectedFilesArr = [];
  renderSelectedFiles();
  
  await loadFiles(currentStaff.name);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  currentStaff = null;
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function loadFiles(name) {
  const container = document.getElementById('filesList');
  container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner"></i><p style="margin-top:10px;color:#94a3b8;">جاري تحميل الملفات...</p></div>';
  
  try {
    const url = APPS_SCRIPT_URL + '?action=getFiles&name=' + encodeURIComponent(name);
    console.log('[LoadFiles] Fetching:', url);
    const response = await fetch(url, { redirect: 'follow' });
    const responseText = await response.text();
    console.log('[LoadFiles] Raw response:', responseText.substring(0, 200));
    let data;
    try {
      data = JSON.parse(responseText);
    } catch(pe) {
      const m = responseText.match(/\{[\s\S]*\}/);
      data = m ? JSON.parse(m[0]) : { success: false };
    }
    
    if (data.success && data.files && data.files.length > 0) {
      fileCounts[name] = data.files.length;
      updateFileCount();
      
      container.innerHTML = '<div class="files-list">' + data.files.map(f => {
        const ext = f.fileName.split('.').pop().toLowerCase();
        let iconClass = 'other';
        let iconName = 'fa-file';
        if (['pdf'].includes(ext)) { iconClass = 'pdf'; iconName = 'fa-file-pdf'; }
        else if (['jpg','jpeg','png','gif','bmp'].includes(ext)) { iconClass = 'image'; iconName = 'fa-file-image'; }
        else if (['doc','docx'].includes(ext)) { iconClass = 'doc'; iconName = 'fa-file-word'; }
        else if (['xls','xlsx'].includes(ext)) { iconClass = 'doc'; iconName = 'fa-file-excel'; }
        
        return `
          <div class="file-item">
            <div class="file-info">
              <div class="file-icon ${iconClass}">
                <i class="fas ${iconName}"></i>
              </div>
              <div>
                <div class="file-name">${f.fileName}</div>
                <div class="file-date">${f.uploadDate || ''}</div>
              </div>
            </div>
            <div class="file-actions">
              <a href="${f.fileUrl}" target="_blank"><i class="fas fa-external-link-alt"></i> فتح</a>
            </div>
          </div>
        `;
      }).join('') + '</div>';
    } else {
      fileCounts[name] = 0;
      updateFileCount();
      container.innerHTML = `
        <div class="no-files">
          <i class="fas fa-folder-open"></i>
          <p>لا توجد ملفات مرفوعة بعد</p>
        </div>
      `;
    }
  } catch (err) {
    console.error('Error loading files:', err);
    container.innerHTML = `
      <div class="no-files">
        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
        <p style="color:#ef4444;">حدث خطأ في تحميل الملفات</p>
        <p style="font-size:0.8rem;color:#64748b;margin-top:5px;">يرجى المحاولة مرة أخرى</p>
      </div>
    `;
  }
}

function updateFileCount() {
  staffMembers.forEach((s, i) => {
    const el = document.getElementById('count_' + i);
    if (el) {
      const count = fileCounts[s.name] || 0;
      el.textContent = count;
      el.className = 'file-count' + (count > 0 ? ' has-files' : '');
    }
  });
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', (e) => {
  handleFiles(e.target.files);
  fileInput.value = '';
});

function handleFiles(files) {
  for (const file of files) {
    if (file.size > 10 * 1024 * 1024) {
      alert('الملف "' + file.name + '" أكبر من 10 ميجا');
      continue;
    }
    if (!selectedFilesArr.find(f => f.name === file.name)) {
      selectedFilesArr.push(file);
    }
  }
  renderSelectedFiles();
}

function renderSelectedFiles() {
  const container = document.getElementById('selectedFiles');
  const btn = document.getElementById('uploadBtn');
  
  if (selectedFilesArr.length === 0) {
    container.innerHTML = '';
    btn.disabled = true;
    return;
  }
  
  btn.disabled = false;
  container.innerHTML = selectedFilesArr.map((f, i) => `
    <div class="selected-file">
      <div class="sf-name">
        <i class="fas fa-file" style="color:#c9a962;"></i>
        ${f.name} <span style="color:#64748b;font-size:0.8rem;">(${(f.size / 1024).toFixed(0)} KB)</span>
      </div>
      <button class="sf-remove" onclick="removeFile(${i})"><i class="fas fa-times"></i></button>
    </div>
  `).join('');
}

function removeFile(index) {
  selectedFilesArr.splice(index, 1);
  renderSelectedFiles();
}

async function uploadFiles() {
  const password = document.getElementById('uploadPassword').value.trim();
  const statusEl = document.getElementById('uploadStatus');
  const btn = document.getElementById('uploadBtn');
  
  if (!password) {
    statusEl.className = 'upload-status error';
    statusEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> الرجاء إدخال الرقم السري';
    return;
  }
  
  if (selectedFilesArr.length === 0) {
    statusEl.className = 'upload-status error';
    statusEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> الرجاء اختيار ملفات للرفع';
    return;
  }
  
  btn.disabled = true;
  let uploadedCount = 0;
  let failedCount = 0;
  
  for (let i = 0; i < selectedFilesArr.length; i++) {
    const file = selectedFilesArr[i];
    statusEl.className = 'upload-status loading';
    statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري رفع الملف ${i + 1} من ${selectedFilesArr.length}: ${file.name}`;
    
    try {
      const base64 = await fileToBase64(file);
      
      console.log('[Upload] Sending file:', file.name, 'for:', currentStaff.name);
      
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'uploadFile',
          password: password,
          staffName: currentStaff.name,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          fileData: base64
        }),
        redirect: 'follow'
      });
      
      const responseText = await response.text();
      console.log('[Upload] Raw response:', responseText.substring(0, 200));
      
      let result;
      try {
        result = JSON.parse(responseText);
      } catch(parseErr) {
        const jsonMatch = responseText.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          result = JSON.parse(jsonMatch[0]);
        } else {
          console.error('[Upload] Cannot parse response:', responseText.substring(0, 500));
          throw new Error('Invalid response from server');
        }
      }
      
      console.log('[Upload] Parsed result:', result);
      
      if (result.success) {
        uploadedCount++;
      } else {
        failedCount++;
        if (result.error === 'WRONG_PASSWORD') {
          statusEl.className = 'upload-status error';
          statusEl.innerHTML = '<i class="fas fa-lock"></i> الرقم السري غير صحيح';
          btn.disabled = false;
          return;
        }
        console.error('[Upload] Server error:', result.error);
        statusEl.className = 'upload-status error';
        statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> خطأ: ' + (result.error || 'غير معروف');
      }
    } catch (err) {
      console.error('[Upload] Error:', err.message);
      failedCount++;
      statusEl.className = 'upload-status error';
      statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> خطأ في الاتصال: ' + err.message;
    }
  }
  
  if (uploadedCount > 0) {
    statusEl.className = 'upload-status success';
    statusEl.innerHTML = `<i class="fas fa-check-circle"></i> تم رفع ${uploadedCount} ملف بنجاح` + (failedCount > 0 ? ` (فشل ${failedCount})` : '');
    selectedFilesArr = [];
    renderSelectedFiles();
    await loadFiles(currentStaff.name);
  } else {
    statusEl.className = 'upload-status error';
    statusEl.innerHTML = '<i class="fas fa-times-circle"></i> فشل رفع الملفات';
  }
  
  btn.disabled = false;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  try {
    const url = APPS_SCRIPT_URL + '?action=getAllCounts';
    console.log('[Counts] Fetching:', url);
    const response = await fetch(url, { redirect: 'follow' });
    const responseText = await response.text();
    console.log('[Counts] Raw response:', responseText.substring(0, 200));
    let data;
    try {
      data = JSON.parse(responseText);
    } catch(pe) {
      const m = responseText.match(/\{[\s\S]*\}/);
      data = m ? JSON.parse(m[0]) : { success: false };
    }
    if (data.success && data.counts) {
