<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فرح حازم ويسرى</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@600&display=swap');

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at top, #1b2a4e, #000);
  color: #fff;
  text-align: center;
  font-family: 'Cairo', sans-serif;
}

/* النص الرئيسي */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

.shahada {
  font-family: 'Amiri', serif;
  font-size: 48px;
  color: #ffd700;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(255,215,0,0.8);
}

.names {
  font-size: 40px;
  margin-top: 10px;
}

.names span {
  color: #ffb6c1;
}

/* القلوب */
.heart {
  position: fixed;
  top: -10px;
  font-size: 24px;
  animation: fall linear forwards;
  opacity: 0.9;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

/* زر الصوت */
.sound-btn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #ffd700;
  color: #000;
  border: none;
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 30px;
  cursor: pointer;
  z-index: 20;
}
</style>
</head>

<body>

<div class="center">
  <div class="shahada">
    لا إله إلا الله<br>
    محمد رسول الله
  </div>

  <div class="names">
    💍 <span>حازم</span> & <span>يسرى</span> 💍
  </div>
</div>

<button class="sound-btn" onclick="playSound()">تشغيل الزغاريد 🎶</button>

<audio id="zaghareed" loop>
  <source src="zaghareed.mp3" type="audio/mpeg">
</audio>

<script>
function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.innerHTML = Math.random() > 0.5 ? '💖' : '✨';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.animationDuration = (3 + Math.random() * 5) + 's';
  heart.style.fontSize = (20 + Math.random() * 25) + 'px';
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 8000);
}

setInterval(createHeart, 300);

function playSound() {
  const audio = document.getElementById('zaghareed');
  audio.play();
}
</script>

</body>
</html>
