<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مبروك للعروسين</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@600;900&display=swap');

:root{
  --pink1:#ffd6e3;
  --pink2:#ff9cbc;
  --pink3:#ff6fa3;
  --ink:#3a0e22;
  --gold:#c9a23f;
}

html, body{
  margin:0; padding:0;
  width:100%; height:100%;
  overflow:hidden;
  font-family:'Cairo', sans-serif;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.55), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,.35), transparent 45%),
    linear-gradient(135deg, var(--pink1), var(--pink2), var(--pink3));
  color: var(--ink);
}

/* البطاقة الوسطية */
.card{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:min(92vw, 900px);
  padding: 28px 18px 22px;
  border-radius: 24px;
  background: rgba(255,255,255,.35);
  border: 1px solid rgba(255,255,255,.45);
  backdrop-filter: blur(10px);
  text-align:center;
  box-shadow: 0 18px 50px rgba(0,0,0,.18);
  z-index:10; /* النص تحت القلوب */
}

.shahada{
  font-family:'Amiri', serif;
  font-size: clamp(30px, 4.5vw, 56px);
  color: #7a1538;
  margin: 0 0 10px 0;
  line-height: 1.35;
}

/* سطر الأسماء + الخواتم من الجهتين */
.names-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap: 14px;
  flex-wrap:wrap;
  margin: 6px 0 6px;
}

.name{
  font-size: clamp(30px, 4.2vw, 62px);
  font-weight: 900;
  color:#4a0f26;
}

/* خواتم جانبية تتحرك وتلتقي */
.ring{
  font-size: clamp(24px, 3vw, 40px);
  color: var(--gold);
  text-shadow: 0 4px 14px rgba(0,0,0,.18);
  display:inline-block;
  will-change: transform;
}

.ring.left{
  animation: meetLeft 2.6s ease-in-out infinite;
}
.ring.right{
  animation: meetRight 2.6s ease-in-out infinite;
}

@keyframes meetLeft{
  0%,100%{ transform: translateX(0) rotate(-6deg); }
  50%{ transform: translateX(18px) rotate(6deg); }
}
@keyframes meetRight{
  0%,100%{ transform: translateX(0) rotate(6deg); }
  50%{ transform: translateX(-18px) rotate(-6deg); }
}

.congrats{
  font-size: clamp(18px, 2.2vw, 26px);
  font-weight: 900;
  margin: 6px 0 2px;
}

.date{
  font-size: clamp(16px, 2vw, 22px);
  font-weight: 800;
  margin-top: 8px;
  opacity: .9;
}

/* القلوب النازلة: أمام الكلام */
.falling-heart{
  position: fixed;
  top: -100px;
  width: 92px;
  height: 92px;
  pointer-events:none;
  z-index: 30;   /* أهم شيء: فوق البطاقة */
  animation: fall linear forwards;
  filter: drop-shadow(0 10px 18px rgba(0,0,0,.18));
}

@keyframes fall{
  to{ transform: translateY(120vh); opacity:.2; }
}

/* شكل القلب */
.heart-shape{
  position:absolute;
  inset:0;
  transform: rotate(45deg);
  background: rgba(255,255,255,.62);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.55);
}
.heart-shape:before,
.heart-shape:after{
  content:"";
  position:absolute;
  width:100%; height:100%;
  background: rgba(255,255,255,.62);
  border-radius:50%;
  border: 1px solid rgba(255,255,255,.55);
}
.heart-shape:before{ top:-50%; left:0; }
.heart-shape:after{ left:-50%; top:0; }

/* محتوى القلب (اسم/خاتم) */
.heart-content{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transform: rotate(-45deg);
  font-weight: 900;
  font-size: 22px;
  color:#7a1538;
}
.heart-content.ring{
  font-size: 26px;
  color: var(--gold);
}
</style>
</head>

<body>

<div class="card">
  <div class="shahada">لا إله إلا الله<br>محمد رسول الله</div>

  <div class="congrats">مبروك للعروسين</div>

  <div class="names-row">
    <span class="ring left">💍</span>
    <span class="name">حازم</span>
    <span class="name" style="font-weight:800; opacity:.85;">&amp;</span>
    <span class="name">يسرى</span>
    <span class="ring right">💍</span>
  </div>

  <div class="date">٥ رجب ١٤٤٧</div>
</div>

<script>
/* القلوب النازلة أمام النص */
const items = ["حازم","يسرى","💍"]; // يتناوب اسم/اسم/خاتم

function spawnHeart(){
  const wrap = document.createElement("div");
  wrap.className = "falling-heart";
  wrap.style.left = (Math.random()*100) + "vw";

  const size = 70 + Math.random()*45;
  wrap.style.width = size + "px";
  wrap.style.height = size + "px";

  const dur = 6.5 + Math.random()*5;
  wrap.style.animationDuration = dur + "s";

  const shape = document.createElement("div");
  shape.className = "heart-shape";

  const content = document.createElement("div");
  const pick = items[Math.floor(Math.random()*items.length)];

  if(pick === "💍"){
    content.className = "heart-content ring";
    content.textContent = "💍";
  }else{
    content.className = "heart-content";
    content.textContent = pick;
  }

  wrap.appendChild(shape);
  wrap.appendChild(content);
  document.body.appendChild(wrap);

  setTimeout(()=>wrap.remove(), (dur+1)*1000);
}

/* كثافة هادئة */
setInterval(spawnHeart, 750);
</script>

</body>
</html>
