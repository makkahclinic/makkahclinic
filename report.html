<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>رفع بلاغ شكوى - مجمع مكة الطبي</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root { --primary:#0a4c8b; --secondary:#1a936f; --accent:#f9a826; }
    body { font-family:'Tajawal',sans-serif; background:#f8fafc; }
    .form-label{display:block;margin-bottom:.5rem;font-weight:700;color:#334155}
    .form-label.required::after{content:" *";color:#dc2626}
    .form-input,.form-select,.form-textarea{
      width:100%; padding:.75rem 1rem; border:1px solid #cbd5e1; border-radius:.75rem;
      font-size:1rem; background:#f8fafc; transition:.2s;
    }
    .form-input:focus,.form-select:focus,.form-textarea:focus{
      outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(249,168,38,.25);
    }
    .invalid{border-color:#dc2626 !important}
    .error-message{color:#dc2626;font-size:.875rem;min-height:1.25rem;margin-top:.25rem}
    .btn{
      padding:.75rem 1.25rem; border-radius:.75rem; font-weight:800; cursor:pointer;
      transition:.2s; display:inline-flex; align-items:center; justify-content:center; gap:.5rem;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }
    .btn:hover{transform:translateY(-1px); box-shadow:0 10px 18px rgba(0,0,0,.10)}
    .btn-primary{background:linear-gradient(135deg,var(--primary),#144c63); color:#fff}
    .btn-secondary{background:#e2e8f0; color:#334155}
    .btn:disabled{opacity:.6; cursor:not-allowed; transform:none; box-shadow:none}
    .category-card.selected{border-color:var(--accent)!important; background:#fffbeb; box-shadow:0 0 0 2px rgba(249,168,38,.35)}
    .severity-card.selected{box-shadow:0 0 0 3px rgba(249,168,38,.35); border-color:var(--accent)!important}
    .chip{display:inline-flex;align-items:center;gap:.4rem;border:1px solid #e2e8f0;background:#fff;border-radius:999px;padding:.35rem .6rem;font-size:.85rem}
  </style>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
  <div class="container max-w-4xl w-full">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden" id="formContainer">
      <header class="bg-gradient-to-br from-[var(--primary)] to-[var(--secondary)] text-white p-6 sm:p-8 text-center">
        <h1 class="text-2xl sm:text-3xl font-extrabold">مجمع مكة الطبي بالزاهر</h1>
        <p class="text-lg sm:text-xl mt-2 opacity-90">رفع بلاغ شكوى</p>
        <p class="text-sm mt-2 opacity-80">سيتم توجيه الشكوى تلقائيًا حسب التصنيف</p>
      </header>

      <div id="form-content-wrapper">
        <div class="p-6 sm:p-8">
          <div id="progressBar" class="mb-8"></div>

          <form id="unifiedForm" novalidate>
            <div class="form-step" data-step="1"></div>
            <div class="form-step hidden" data-step="2"></div>
            <div class="form-step hidden" data-step="3"></div>
            <div class="form-step hidden" data-step="4"></div>
          </form>

          <div class="form-actions mt-8 pt-6 border-t border-slate-200 flex justify-between items-center">
            <button type="button" id="prevBtn" class="btn btn-secondary hidden">السابق</button>
            <button type="button" id="nextBtn" class="btn btn-primary">التالي</button>
            <button type="submit" id="submitBtn" form="unifiedForm" class="btn btn-primary hidden">إرسال الشكوى</button>
          </div>
        </div>
      </div>

      <div id="success-screen" class="p-8 text-center hidden">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
          <svg class="h-10 w-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <h2 class="mt-6 text-2xl font-extrabold text-slate-800">تم إرسال شكواك بنجاح!</h2>
        <p class="mt-2 text-slate-600">شكراً لك. سيقوم فريقنا بمراجعة الشكوى واتخاذ الإجراءات اللازمة.</p>
        <div class="mt-4 text-slate-800 font-bold" id="successComplaintId"></div>

        <div class="mt-8 flex flex-col sm:flex-row justify-center gap-4">
          <button type="button" id="newReportBtn" class="btn btn-primary">تقديم شكوى جديدة</button>
          <a href="mega.html" class="btn btn-secondary">العودة للمركز الرقمي</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white py-3 px-6 rounded-lg shadow-lg flex items-center gap-3 transform translate-x-[150%] transition-transform duration-500 ease-in-out z-50">
    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <span id="toastMessage"></span>
  </div>

  <script>
  (function () {
    // ✅ ضع رابط Apps Script هنا
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyE0nbyfYrDZeOHr6TuEQP7ivpOLF1pLmBFoF7fkDmNjQp5g6dW4i0xkcSBJJRaoOCVAw/exec";

    let currentStep = 1;
    const totalSteps = 4;

    // ديناميكي من Master (Room Code / Room Description)
    let locations = [];
    let locationsLoaded = false;

    // ملفات
    let attachedFiles = [];

    const dom = {
      form: document.getElementById('unifiedForm'),
      nextBtn: document.getElementById('nextBtn'),
      prevBtn: document.getElementById('prevBtn'),
      submitBtn: document.getElementById('submitBtn'),
      formContentWrapper: document.getElementById('form-content-wrapper'),
      successScreen: document.getElementById('success-screen'),
      newReportBtn: document.getElementById('newReportBtn'),
      progressBar: document.getElementById('progressBar'),
      successComplaintId: document.getElementById('successComplaintId'),
    };

    const complaintCategories = [
      { id: 'financial', name: 'شكوى مالية', icon: '💰', subs: ['تأخر رواتب','خصومات غير مبررة','مستحقات متأخرة','أخرى'] },
      { id: 'equipment', name: 'نقص معدات', icon: '🔧', subs: ['أجهزة طبية','معدات مكتبية','أدوات عمل','أخرى'] },
      { id: 'staffing', name: 'نقص كوادر', icon: '👥', subs: ['تمريض','خدمية/نظافة','إداري','فني','أخرى'] },
      { id: 'maintenance', name: 'شكوى صيانة', icon: '🛠️', subs: ['مكيف عاطل','انقطاع مياه','حمام خربان','كهرباء','لوحات مكسورة','لمبات','تشوهات بصرية','نظافة خارجية','أخرى'] },
      { id: 'behavior', name: 'شكوى سلوك', icon: '⚠️', subs: ['تعدي لفظي','تعدي جسدي','إهانة','تحرش','أخرى'] },
      { id: 'medical', name: 'شكوى طبية', icon: '🏥', subs: ['ضد طبيب','ضد ممرض','ضد مريض','خطأ طبي','تأخر علاج','أخرى'] },
      { id: 'administrative', name: 'شكوى إدارية', icon: '📋', subs: ['ضد استقبال','ضد مدير','ضد موظف','تأخر إجراءات','أخرى'] },
      { id: 'materials', name: 'نقص مواد', icon: '📦', subs: ['مواد أسنان','مواد طبية','مستلزمات مختبر','أدوية','أخرى'] }
    ];

    const severityLabels = { high: 'عالية', medium: 'متوسطة', low: 'منخفضة' };

    // ---------------------------
    // Helpers
    // ---------------------------
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toastMessage');
      msg.textContent = message;
      toast.classList.toggle('bg-green-500', !isError);
      toast.classList.toggle('bg-red-500', isError);
      toast.classList.remove('translate-x-[150%]');
      setTimeout(() => toast.classList.add('translate-x-[150%]'), 3200);
    }

    function getCurrentLocalISOString() {
      const now = new Date();
      const tz = now.getTimezoneOffset() * 60000;
      return new Date(now - tz).toISOString().slice(0,16);
    }

    async function loadLocationsFromSheet() {
      try {
        const res = await fetch(SCRIPT_URL + '?action=getLocations');
        const data = await res.json();
        if (data.ok && Array.isArray(data.locations) && data.locations.length > 0) {
          locations = data.locations;
          locationsLoaded = true;
          updateLocationSelector();
          updateDepartmentSelector();
          return;
        }
        throw new Error('No locations in Master');
      } catch (e) {
        console.error(e);
        locations = [];
        locationsLoaded = true;
        updateLocationSelector();
        updateDepartmentSelector();
        showToast('تعذر تحميل مواقع Master', true);
      }
    }

    function updateLocationSelector() {
      const selector = document.getElementById('locationSelector');
      if (!selector) return;

      if (!locationsLoaded) {
        selector.innerHTML = `<div class="text-slate-500 text-sm">جاري التحميل...</div>`;
        return;
      }
      if (!locations.length) {
        selector.innerHTML = `<div class="text-red-600 text-sm">لا توجد مواقع في Master</div>`;
        return;
      }
      selector.innerHTML = locations.map(loc => `
        <label class="flex items-center gap-2 p-2 rounded hover:bg-slate-50 cursor-pointer">
          <input type="checkbox" name="locations" value="${loc.code}" class="location-checkbox w-4 h-4 accent-[var(--primary)]">
          <span class="text-sm">${loc.name} <span class="text-slate-400">(${loc.code})</span></span>
        </label>
      `).join('');
    }

    function updateDepartmentSelector() {
      const sel = document.getElementById('departmentSelect');
      if (!sel) return;

      if (!locationsLoaded) {
        sel.innerHTML = `<option value="" disabled selected>جاري التحميل...</option>`;
        return;
      }
      if (!locations.length) {
        sel.innerHTML = `<option value="" disabled selected>لا توجد أقسام في Master</option>`;
        return;
      }

      sel.innerHTML =
        `<option value="" disabled selected>اختر القسم...</option>` +
        locations.map(loc => `<option value="${loc.code}">${loc.name}</option>`).join('');
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({
          name: file.name,
          mimeType: file.type || 'application/octet-stream',
          data: reader.result.split(',')[1]
        });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function handleFileSelect(e) {
      const files = Array.from(e.target.files || []);
      const list = document.getElementById('fileList');
      if (!list) return;

      files.forEach(file => {
        if (attachedFiles.length >= 5) {
          showToast('الحد الأقصى 5 ملفات', true);
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          showToast(`الملف ${file.name} أكبر من 5MB`, true);
          return;
        }
        attachedFiles.push(file);

        const item = document.createElement('div');
        item.className = 'flex items-center justify-between bg-slate-50 p-3 rounded-lg';
        item.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="chip">📎</span>
            <span class="text-sm truncate max-w-xs">${file.name}</span>
          </div>
          <button type="button" class="text-red-600 font-bold">×</button>
        `;
        item.querySelector('button').onclick = () => {
          attachedFiles = attachedFiles.filter(f => f !== file);
          item.remove();
        };
        list.appendChild(item);
      });

      e.target.value = '';
    }

    // ---------------------------
    // Progress Bar + Steps
    // ---------------------------
    function renderProgressBar() {
      dom.progressBar.innerHTML = `
        <div class="flex justify-between items-center relative">
          <div class="absolute top-1/2 -translate-y-1/2 w-full h-1 bg-slate-200"></div>
          <div id="progress-bar-line" class="absolute top-1/2 -translate-y-1/2 w-0 h-1 bg-[var(--accent)] transition-all duration-500"></div>
          ${[1,2,3,4].map(i => `
            <div class="progress-step z-10 flex flex-col items-center" data-step="${i}">
              <div class="step-circle w-10 h-10 flex items-center justify-center rounded-full font-extrabold text-lg transition-all duration-300 bg-slate-200 text-slate-500">${i}</div>
              <div class="step-label mt-2 text-xs text-center text-slate-500 font-bold"></div>
            </div>
          `).join('')}
        </div>`;
    }

    function updateProgressBar() {
      const line = document.getElementById('progress-bar-line');
      const pct = ((currentStep - 1) / (totalSteps - 1)) * 100;
      line.style.width = `${pct}%`;

      document.querySelectorAll('.progress-step').forEach(step => {
        const stepNum = parseInt(step.dataset.step, 10);
        const circle = step.querySelector('.step-circle');
        if (stepNum < currentStep) {
          circle.className = 'step-circle w-10 h-10 flex items-center justify-center rounded-full font-extrabold text-lg bg-green-500 text-white';
          circle.textContent = '✓';
        } else if (stepNum === currentStep) {
          circle.className = 'step-circle w-10 h-10 flex items-center justify-center rounded-full font-extrabold text-lg bg-[var(--accent)] text-white';
          circle.textContent = stepNum;
        } else {
          circle.className = 'step-circle w-10 h-10 flex items-center justify-center rounded-full font-extrabold text-lg bg-slate-200 text-slate-500';
          circle.textContent = stepNum;
        }
      });
    }

    function renderStepContent() {
      // Step 1
      document.querySelector('.form-step[data-step="1"]').innerHTML = `
        <h2 class="text-xl font-extrabold text-[var(--primary)] border-b-2 border-[var(--accent)] pb-3 mb-6">القسم 1: تصنيف الشكوى</h2>

        <div class="form-group mb-4">
          <label for="complaintType" class="form-label required">نوع الشاكي</label>
          <select id="complaintType" name="complaintType" class="form-select" required>
            <option value="" disabled selected>اختر نوع الشاكي...</option>
            <option value="شكوى موظف">شكوى موظف</option>
            <option value="شكوى مريض">شكوى مريض</option>
            <option value="شكوى زائر">شكوى زائر</option>
          </select>
          <p class="error-message"></p>
        </div>

        <div class="form-group mb-4">
          <label class="form-label required">تصنيف الشكوى الرئيسي</label>
          <div id="categoryGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3">
            ${complaintCategories.map(cat => `
              <div class="category-card cursor-pointer border-2 border-slate-200 rounded-xl p-4 text-center hover:border-[var(--accent)] hover:bg-amber-50 transition-all"
                   data-category="${cat.id}">
                <div class="text-3xl mb-2">${cat.icon}</div>
                <div class="font-extrabold text-sm text-slate-800">${cat.name}</div>
              </div>
            `).join('')}
          </div>
          <input type="hidden" id="primaryCategoryId" value="">
          <p id="categoryError" class="error-message"></p>
        </div>

        <div class="form-group mb-4 hidden" id="subcategorySection">
          <label class="form-label required">التصنيف الفرعي</label>
          <select id="subcategory" class="form-select">
            <option value="" disabled selected>اختر التصنيف الفرعي...</option>
          </select>
          <p class="error-message"></p>
        </div>

        <div class="form-group">
          <label class="form-label required">درجة الخطورة</label>
          <div class="flex gap-4 justify-center flex-wrap">
            ${[
              {v:'high', icon:'🔴', t:'عالية', d:'تحتاج تدخل فوري'},
              {v:'medium', icon:'🟡', t:'متوسطة', d:'تحتاج متابعة'},
              {v:'low', icon:'🔵', t:'منخفضة', d:'للعلم فقط'},
            ].map(x => `
              <label class="cursor-pointer">
                <input type="radio" name="severity" value="${x.v}" class="hidden">
                <div class="severity-card border-2 border-slate-200 rounded-xl p-4 text-center hover:bg-slate-50 transition-all" style="min-width:120px;">
                  <div class="text-2xl mb-1">${x.icon}</div>
                  <div class="font-extrabold">${x.t}</div>
                  <div class="text-xs text-slate-500">${x.d}</div>
                </div>
              </label>
            `).join('')}
          </div>
          <p id="severityError" class="error-message"></p>
        </div>
      `;

      // Step 2
      document.querySelector('.form-step[data-step="2"]').innerHTML = `
        <h2 class="text-xl font-extrabold text-[var(--primary)] border-b-2 border-[var(--accent)] pb-3 mb-6">القسم 2: بيانات مقدم الشكوى</h2>
        <div class="grid md:grid-cols-2 gap-x-6 gap-y-4">
          <div class="form-group">
            <label class="form-label required">اسم مقدم الشكوى</label>
            <input type="text" id="complainantName" class="form-input" placeholder="الاسم الكامل" required>
            <p class="error-message"></p>
          </div>
          <div class="form-group">
            <label class="form-label">رقم الجوال (اختياري)</label>
            <input type="tel" id="complainantPhone" class="form-input" placeholder="05xxxxxxxx">
            <p class="error-message"></p>
          </div>
          <div class="form-group md:col-span-2">
            <label class="form-label">البريد الإلكتروني (اختياري)</label>
            <input type="email" id="complainantEmail" class="form-input" placeholder="example@email.com">
            <p class="error-message"></p>
          </div>
        </div>
      `;

      // Step 3
      document.querySelector('.form-step[data-step="3"]').innerHTML = `
        <h2 class="text-xl font-extrabold text-[var(--primary)] border-b-2 border-[var(--accent)] pb-3 mb-6">القسم 3: تفاصيل الشكوى</h2>
        <div class="grid gap-y-4">
          <div class="form-group">
            <label class="form-label required">تاريخ ووقت حدوث المشكلة</label>
            <input type="datetime-local" id="complaintDateTime" class="form-input" required>
            <p class="error-message"></p>
          </div>

          <div class="form-group">
            <label class="form-label required">القسم</label>
            <select id="departmentSelect" class="form-select" required>
              <option value="" disabled selected>جاري التحميل...</option>
            </select>
            <p class="error-message"></p>
          </div>

          <div class="form-group">
            <label class="form-label required">موقع الحدث (يمكن اختيار أكثر من موقع)</label>
            <div id="locationSelector" class="grid grid-cols-2 md:grid-cols-3 gap-2 max-h-52 overflow-y-auto border border-slate-200 rounded-xl p-3">
              <div class="text-slate-500 text-sm">جاري التحميل...</div>
            </div>
            <p class="error-message"></p>
          </div>

          <div class="form-group">
            <label class="form-label required">وصف تفصيلي للشكوى</label>
            <textarea id="complaintDescription" rows="5" class="form-textarea" placeholder="اشرح المشكلة بالتفصيل..." required></textarea>
            <p class="error-message"></p>
          </div>

          <div class="form-group">
            <label class="form-label">الشكوى ضد (اختياري)</label>
            <input type="text" id="complaintAgainst" class="form-input" placeholder="اسم الشخص أو القسم المشكو منه">
            <p class="error-message"></p>
          </div>
        </div>
      `;

      // Step 4
      document.querySelector('.form-step[data-step="4"]').innerHTML = `
        <h2 class="text-xl font-extrabold text-[var(--primary)] border-b-2 border-[var(--accent)] pb-3 mb-6">القسم 4: المرفقات والملاحظات</h2>
        <div class="grid gap-y-4">
          <div class="form-group">
            <label class="form-label">إرفاق صور أو مستندات (اختياري)</label>
            <div class="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center">
              <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx" class="hidden">
              <button type="button" id="pickFilesBtn" class="btn btn-secondary">اختيار ملفات</button>
              <p class="text-slate-500 text-sm mt-2">صور، PDF، أو Word (حد أقصى 5 ملفات، 5MB لكل ملف)</p>
            </div>
            <div id="fileList" class="mt-3 space-y-2"></div>
          </div>

          <div class="form-group">
            <label class="form-label">ملاحظات إضافية</label>
            <textarea id="additionalNotes" rows="3" class="form-textarea" placeholder="أي معلومات إضافية ترغب في إضافتها..."></textarea>
          </div>

          <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
            <div class="flex items-start gap-3">
              <div class="chip">ℹ️</div>
              <div>
                <p class="font-extrabold text-amber-800">ملاحظة هامة</p>
                <p class="text-amber-700 text-sm mt-1">سيتم التعامل مع شكواك بسرية تامة وسيتم توجيهها تلقائيًا للمسؤول المناسب.</p>
              </div>
            </div>
          </div>
        </div>
      `;

      initCategorySelectors();
      initSeveritySelectors();
    }

    function initCategorySelectors() {
      document.querySelectorAll('.category-card').forEach(card => {
        card.addEventListener('click', () => {
          document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          const selectedId = card.dataset.category;
          document.getElementById('primaryCategoryId').value = selectedId;

          const cat = complaintCategories.find(c => c.id === selectedId);
          const section = document.getElementById('subcategorySection');
          const sub = document.getElementById('subcategory');

          if (cat && cat.subs && cat.subs.length) {
            section.classList.remove('hidden');
            sub.innerHTML = `<option value="" disabled selected>اختر التصنيف الفرعي...</option>` +
              cat.subs.map(s => `<option value="${s}">${s}</option>`).join('');
          } else {
            section.classList.add('hidden');
            sub.innerHTML = `<option value="" disabled selected>اختر التصنيف الفرعي...</option>`;
          }
          document.getElementById('categoryError').textContent = '';
        });
      });
    }

    function initSeveritySelectors() {
      document.querySelectorAll('input[name="severity"]').forEach(inp => {
        inp.addEventListener('change', () => {
          document.querySelectorAll('.severity-card').forEach(c => c.classList.remove('selected'));
          inp.nextElementSibling.classList.add('selected');
          document.getElementById('severityError').textContent = '';
        });
      });
    }

    function showStep(step) {
      document.querySelectorAll('.form-step').forEach(s => s.classList.add('hidden'));
      document.querySelector(`.form-step[data-step="${step}"]`).classList.remove('hidden');

      dom.prevBtn.classList.toggle('hidden', step === 1);
      dom.nextBtn.classList.toggle('hidden', step === totalSteps);
      dom.submitBtn.classList.toggle('hidden', step !== totalSteps);

      if (step === 3) {
        const dt = document.getElementById('complaintDateTime');
        if (dt && !dt.value) dt.value = getCurrentLocalISOString();
        updateLocationSelector();
        updateDepartmentSelector();
      }

      if (step === 4) {
        const pickBtn = document.getElementById('pickFilesBtn');
        const fileInput = document.getElementById('fileInput');
        if (pickBtn && fileInput) {
          pickBtn.onclick = () => fileInput.click();
          fileInput.onchange = handleFileSelect;
        }
      }

      updateProgressBar();
    }
